<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Academy | Accounting & Finance</title>
    <style>
        html, body { background-color: #FAFAFA !important; margin: 0; padding: 0; }
        @media (min-width: 768px) { #global-sidebar-container { background-color: #0A0A0A !important; min-width: 15rem; } }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="./static/css/global.css">
    <script src="./static/js/app.js"></script>
</head>
<body class="flex h-screen overflow-hidden text-[13px] antialiased">
    <div id="global-sidebar-container" class="flex flex-col h-full shrink-0"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full bg-[#FAFAFA] relative">
        <header class="h-14 border-b border-gray-200 flex items-center justify-between px-4 md:px-8 bg-white shrink-0 gap-4">
            <h2 class="font-semibold text-xs uppercase tracking-widest text-gray-400 hidden md:block">Financial Ledger</h2>
            
            <div class="relative w-full max-w-lg z-30">
                <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                <input type="text" id="liveStudentSearch" onkeyup="filterStudents()" placeholder="Search student name or phone to log payment..." class="w-full pl-9 pr-3 py-2 bg-gray-50 border border-gray-300 rounded-lg text-xs font-medium focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-all">
                
                <div id="searchDropdown" class="absolute top-full left-0 right-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-xl hidden max-h-60 overflow-y-auto">
                    <ul id="searchResultsList" class="divide-y divide-gray-100"></ul>
                </div>
            </div>

            <button onclick="exportLedger()" class="border border-gray-200 text-gray-700 px-3 py-1.5 rounded-md text-xs font-medium flex items-center gap-1.5 hover:bg-gray-50 transition-colors shrink-0"><i class="ph ph-download"></i> Export</button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[700px]">
                    <thead>
                        <tr class="bg-gray-50/50 text-[11px] font-medium text-gray-500 uppercase tracking-wider border-b border-gray-200">
                            <th class="px-5 py-3">Date</th>
                            <th class="px-5 py-3">Student</th>
                            <th class="px-5 py-3">Method</th>
                            <th class="px-5 py-3">Reference / Notes</th>
                            <th class="px-5 py-3 text-right">Amount Received</th>
                        </tr>
                    </thead>
                    <tbody id="ledgerBody" class="divide-y divide-gray-100 text-xs"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="paymentModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm border border-gray-200 overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="text-xs font-semibold text-gray-900 uppercase tracking-wider">Record Payment</h3>
                <button onclick="closePaymentModal()" class="text-gray-400 hover:text-black"><i class="ph ph-x text-base"></i></button>
            </div>
            <form id="paymentForm" class="p-6 space-y-4">
                <input type="hidden" id="pay_student_id">
                
                <div>
                    <label class="block text-[10px] font-semibold text-gray-500 mb-1">Student</label>
                    <input type="text" id="pay_student_name" readonly class="w-full px-3 py-2 bg-gray-100 border border-gray-200 rounded-md text-xs font-medium text-gray-600">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-semibold text-gray-500 mb-1">Amount (₹) *</label>
                        <input type="number" id="pay_amount" required class="w-full px-3 py-2 bg-white border border-gray-200 rounded-md text-xs font-bold text-green-600">
                    </div>
                    <div>
                        <label class="block text-[10px] font-semibold text-gray-500 mb-1">Method *</label>
                        <select id="pay_method" class="w-full px-3 py-2 bg-white border border-gray-200 rounded-md text-xs font-semibold">
                            <option value="CASH">Cash</option>
                            <option value="UPI">UPI / GPay</option>
                            <option value="BANK">Bank Transfer</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-semibold text-gray-500 mb-1">Reference ID / Notes</label>
                    <input type="text" id="pay_reference" placeholder="e.g. UPI Transaction ID or Month Paid" class="w-full px-3 py-2 bg-white border border-gray-200 rounded-md text-xs">
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bg-black text-white font-medium py-2.5 rounded-md text-xs hover:bg-gray-800 transition-colors flex items-center justify-center gap-2"><i class="ph ph-check-circle"></i> Confirm Payment</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const authHeaders = { 'Authorization': `Bearer ${localStorage.getItem('scorp_token')}`, 'Content-Type': 'application/json' };
        let allStudents = [];
        let ledgerData = [];

        // 1. Fetch Data
        async function loadData() {
            // Load Ledger
            document.getElementById('ledgerBody').innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-400 animate-pulse">Syncing ledger...</td></tr>`;
            try {
                const ledgerRes = await fetch('http://127.0.0.1:8000/api/finance/ledger/', { headers: authHeaders });
                ledgerData = await res.json();
                renderLedger();
            } catch(e) { document.getElementById('ledgerBody').innerHTML = `<tr><td colspan="5" class="p-8 text-center text-red-500">Failed to load ledger.</td></tr>`; }

            // Load Students for Search Bar
            try {
                const studentRes = await fetch('http://127.0.0.1:8000/api/students/', { headers: authHeaders });
                allStudents = await studentRes.json();
                
                // Auto-Open Modal if Redirected from Profile Page
                const urlParams = new URLSearchParams(window.location.search);
                const targetStudentId = urlParams.get('student_id');
                if (targetStudentId) {
                    const targetStudent = allStudents.find(s => s.id === targetStudentId);
                    if (targetStudent) openPaymentModal(targetStudent.id, `${targetStudent.first_name} ${targetStudent.last_name || ''}`, targetStudent.custom_fee);
                    // Clean URL to prevent re-opening on refresh
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            } catch(e) { console.error("Failed to load students for search."); }
        }

        // 2. Render Ledger Table
        function renderLedger() {
            const tbody = document.getElementById('ledgerBody');
            if(ledgerData.length === 0) { tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-400">No transactions recorded yet.</td></tr>`; return; }

            tbody.innerHTML = ledgerData.map(t => {
                let methodColor = t.method === 'UPI' ? 'text-purple-600 bg-purple-50' : t.method === 'BANK' ? 'text-blue-600 bg-blue-50' : 'text-emerald-600 bg-emerald-50';
                return `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-5 py-4 font-mono text-gray-500">${t.date_string}</td>
                    <td class="px-5 py-4"><div class="font-bold text-gray-900">${t.student_name}</div><div class="text-[10px] text-gray-400 uppercase mt-0.5">${t.branch_name}</div></td>
                    <td class="px-5 py-4"><span class="px-2 py-0.5 rounded text-[10px] font-bold tracking-wider uppercase ${methodColor}">${t.method}</span></td>
                    <td class="px-5 py-4 text-[11px] text-gray-600">${t.reference || '-'}</td>
                    <td class="px-5 py-4 text-right"><span class="text-base font-bold text-gray-900">₹${t.amount}</span></td>
                </tr>`;
            }).join('');
        }

        // 3. Live Autocomplete Search Logic
        function filterStudents() {
            const input = document.getElementById('liveStudentSearch').value.toLowerCase();
            const dropdown = document.getElementById('searchDropdown');
            const list = document.getElementById('searchResultsList');
            
            if (input.length < 1) { dropdown.classList.add('hidden'); return; }

            const filtered = allStudents.filter(s => 
                (s.first_name + ' ' + (s.last_name||'')).toLowerCase().includes(input) || 
                (s.phone||'').includes(input)
            ).slice(0, 5); // Limit to top 5 results for speed

            if (filtered.length === 0) {
                list.innerHTML = `<li class="px-4 py-3 text-xs text-gray-400">No students found.</li>`;
            } else {
                list.innerHTML = filtered.map(s => {
                    const fullName = `${s.first_name} ${s.last_name || ''}`;
                    return `
                    <li onclick="openPaymentModal('${s.id}', '${fullName.replace(/'/g, "\\'")}', '${s.custom_fee||0}')" class="px-4 py-3 hover:bg-gray-50 cursor-pointer transition-colors flex justify-between items-center group">
                        <div>
                            <div class="font-semibold text-gray-900 text-xs">${fullName}</div>
                            <div class="text-[10px] text-gray-400 font-mono mt-0.5">${s.phone}</div>
                        </div>
                        <button class="opacity-0 group-hover:opacity-100 bg-black text-white text-[10px] font-bold px-2 py-1 rounded transition-opacity">Pay</button>
                    </li>`;
                }).join('');
            }
            dropdown.classList.remove('hidden');
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!document.getElementById('liveStudentSearch').contains(e.target) && !document.getElementById('searchDropdown').contains(e.target)) {
                document.getElementById('searchDropdown').classList.add('hidden');
            }
        });

        // 4. Modal Logic
        function openPaymentModal(studentId, studentName, defaultFee) {
            document.getElementById('searchDropdown').classList.add('hidden');
            document.getElementById('liveStudentSearch').value = '';
            
            document.getElementById('pay_student_id').value = studentId;
            document.getElementById('pay_student_name').value = studentName;
            document.getElementById('pay_amount').value = defaultFee;
            document.getElementById('pay_method').value = 'CASH';
            document.getElementById('pay_reference').value = '';
            
            document.getElementById('paymentModal').classList.remove('hidden');
        }

        function closePaymentModal() { document.getElementById('paymentModal').classList.add('hidden'); }

        // 5. Submit Payment
        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                student_id: document.getElementById('pay_student_id').value,
                amount: document.getElementById('pay_amount').value,
                method: document.getElementById('pay_method').value,
                reference: document.getElementById('pay_reference').value
            };

            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Processing...';

            try {
                const res = await fetch('http://127.0.0.1:8000/api/finance/ledger/', { 
                    method: 'POST', 
                    headers: authHeaders, 
                    body: JSON.stringify(payload) 
                });
                
                if (res.ok) {
                    closePaymentModal();
                    loadData(); // Refresh ledger
                } else {
                    const data = await res.json();
                    alert(data.error || "Failed to process payment.");
                }
            } catch (err) { alert("Network error. Could not reach server."); }
            
            btn.innerHTML = originalText;
        });

        // 6. Export to Excel
        function exportLedger() {
            if(ledgerData.length === 0) return alert("No data to export.");
            const exportData = ledgerData.map(t => ({
                "Date": t.date_string,
                "Student": t.student_name,
                "Branch": t.branch_name,
                "Method": t.method,
                "Reference": t.reference || '',
                "Amount (₹)": t.amount,
                "Processed By": t.processed_by
            }));
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Financial Ledger");
            XLSX.writeFile(wb, `Scorpion_Academy_Ledger.xlsx`);
        }

        // Init
        loadData();
    </script>
</body>
</html>
