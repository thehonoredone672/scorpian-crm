<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Academy | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
    </style>
</head>
<body class="h-screen flex items-center justify-center">

    <div class="bg-white p-10 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] w-full max-w-[400px]">
        <div class="text-center mb-8 flex flex-col items-center">
            <div class="bg-black text-white p-3 rounded-xl mb-4">
                <i class="ph ph-rocket-launch text-2xl"></i>
            </div>
            <h1 class="text-xl font-bold text-gray-900 tracking-tight">Scorpion Academy</h1>
            <p class="text-xs font-semibold text-gray-400 tracking-widest uppercase mt-1">Dojo Management</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-[11px] font-semibold text-gray-500 uppercase tracking-wider mb-2">Branch ID / Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph ph-buildings text-gray-400 text-lg"></i>
                    </div>
                    <input type="email" id="email" value="architect@scorpion.com" placeholder="e.g. coimbatore-main" required
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 text-gray-900 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all text-sm font-medium">
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-semibold text-gray-500 uppercase tracking-wider mb-2">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph ph-lock text-gray-400 text-lg"></i>
                    </div>
                    <input type="password" id="password" value="ValkyrieProtocol2026!" placeholder="••••••••" required
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 text-gray-900 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all text-sm font-medium">
                </div>
            </div>

            <div id="errorMessage" class="hidden text-red-500 text-xs text-center font-medium"></div>

            <button type="submit" 
                class="w-full bg-black hover:bg-gray-800 text-white font-medium py-3.5 px-4 rounded-xl transition-colors duration-200 flex justify-center items-center gap-2 mt-2">
                Log In <i class="ph ph-arrow-right font-bold"></i>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('errorMessage');
            errorBox.classList.add('hidden');

            try {
                const response = await fetch('http://127.0.0.1:8000/api/auth/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });
                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('scorp_token', data.access_token);
                    localStorage.setItem('scorp_role', data.role);
                    window.location.href = 'dashboard.html'; 
                } else {
                    errorBox.textContent = data.error || 'Authentication Failed';
                    errorBox.classList.remove('hidden');
                }
            } catch (err) {
                errorBox.textContent = 'Network Error: Cannot reach API Gateway.';
                errorBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
