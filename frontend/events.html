<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Academy | Event Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./static/css/global.css">
    <script src="./static/js/app.js"></script>
</head>
<body class="flex h-screen overflow-hidden text-[13px] antialiased">
    <div id="global-sidebar-container" class="h-full shrink-0"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full bg-[#FAFAFA]">
        <header class="h-14 border-b border-gray-200 flex items-center justify-between px-4 md:px-8 bg-white shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileSidebar()" class="p-1.5 bg-gray-50 border border-gray-200 md:hidden rounded-md"><i class="ph ph-list text-base"></i></button>
                <h2 class="font-semibold text-xs uppercase tracking-widest text-gray-400">Academy Events</h2>
            </div>
            <button onclick="openEventModal()" class="bg-black hover:bg-gray-800 text-white px-3 py-1.5 rounded-md text-xs font-medium flex items-center gap-1.5 transition-colors"><i class="ph ph-plus font-bold"></i> Create Event</button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div id="eventsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="p-5 bg-white border border-gray-200 rounded-xl shadow-sm flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="px-1.5 py-0.5 bg-black text-white rounded text-[9px] font-bold uppercase">Seminar</span>
                            <span class="text-xs font-semibold text-gray-900">₹1,500</span>
                        </div>
                        <h3 class="text-sm font-semibold text-gray-900">Advanced Weapons Sparring</h3>
                        <p class="text-[11px] text-gray-500 mt-1">Date: July 15, 2026</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
    </script>
</body>
</html>
