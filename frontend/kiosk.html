<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Academy | Kiosk Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; /* Kiosk uses pure black to save power and look sleek */
            color: #ffffff;
        }
        ::-webkit-scrollbar { display: none; } /* Hide scrollbars for kiosk mode */
        input:focus { outline: none; border-color: #ffffff; }
        
        /* Scanner Scanning Animation */
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scanner-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
            animation: scan 2.5s infinite linear;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden antialiased selection:bg-white selection:text-black">

    <script>
        // Security check
        const token = localStorage.getItem('scorp_token');
        if (!token) window.location.href = 'login.html';
    </script>

    <!-- Main Kiosk Interface -->
    <main class="flex-1 flex flex-col h-screen relative">
        
        <!-- Minimal Kiosk Header -->
        <header class="h-16 border-b border-gray-800 flex items-center justify-between px-8 shrink-0 bg-black">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-white rounded-md flex items-center justify-center text-black">
                    <i class="ph-fill ph-rocket-launch text-lg"></i>
                </div>
                <h1 class="font-bold text-lg tracking-tight">Scorpion Academy <span class="text-gray-600 font-normal ml-2">| Auto Check-In</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-sm font-medium text-gray-400" id="liveClock">00:00:00</div>
                <button id="exitKioskBtn" class="text-gray-500 hover:text-white transition-colors border border-gray-800 hover:border-gray-600 px-3 py-1.5 rounded-md text-xs font-medium">
                    Exit Kiosk
                </button>
            </div>
        </header>

        <div class="flex-1 flex">
            <!-- Left Side: Camera Feed -->
            <div class="w-2/3 border-r border-gray-800 relative bg-gray-900 flex flex-col items-center justify-center p-8">
                
                <div class="relative w-full max-w-lg aspect-video bg-black border border-gray-700 rounded-xl overflow-hidden shadow-2xl">
                    <!-- The HTML5 Video Element -->
                    <video id="webcamFeed" class="w-full h-full object-cover transform scale-x-[-1]" autoplay playsinline></video>
                    
                    <!-- UI Overlay for the Scanner -->
                    <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
                        <div class="w-64 h-64 border-2 border-white/20 relative">
                            <!-- Corner Accents -->
                            <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-white"></div>
                            <div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-white"></div>
                            <div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-white"></div>
                            <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-white"></div>
                            
                            <!-- Laser Line -->
                            <div class="scanner-line"></div>
                        </div>
                    </div>

                    <!-- Camera Status -->
                    <div class="absolute bottom-4 left-4 flex items-center gap-2 bg-black/60 backdrop-blur-md px-3 py-1.5 rounded-full border border-gray-700">
                        <div id="camStatusDot" class="w-2 h-2 rounded-full bg-red-500"></div>
                        <span id="camStatusText" class="text-[11px] font-medium text-gray-300">Camera Offline</span>
                    </div>
                </div>

                <p class="text-gray-500 text-sm mt-8 font-medium">Present your Academy ID Card to the camera to register attendance.</p>
            </div>

            <!-- Right Side: Manual Entry & Feed -->
            <div class="w-1/3 flex flex-col bg-black">
                
                <!-- Manual Override Block -->
                <div class="p-8 border-b border-gray-800">
                    <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-4">Manual Entry Override</h3>
                    <form id="manualCheckinForm" class="flex gap-2">
                        <input type="text" id="studentPin" placeholder="Enter 6-Digit ID" autocomplete="off"
                            class="flex-1 bg-gray-900 border border-gray-800 px-4 py-3 rounded-lg text-sm text-white placeholder-gray-600 font-mono tracking-widest text-center transition-colors">
                        <button type="submit" class="bg-white text-black px-6 py-3 rounded-lg text-sm font-semibold hover:bg-gray-200 transition-colors">
                            Enter
                        </button>
                    </form>
                    <div id="checkinMessage" class="hidden mt-3 text-center text-xs font-medium py-2 rounded-md"></div>
                </div>

                <!-- Live Attendance Feed -->
                <div class="flex-1 flex flex-col p-8 overflow-hidden">
                    <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-4">Recent Access Logs</h3>
                    
                    <div id="activityFeed" class="flex-1 overflow-y-auto space-y-3">
                        <!-- Mockup Logs -->
                        <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-green-500/20 flex items-center justify-center text-green-500 shrink-0">
                                <i class="ph-fill ph-check-circle text-xl"></i>
                            </div>
                            <div>
                                <h4 class="text-sm font-semibold text-white">System Initialized</h4>
                                <p class="text-[11px] text-gray-500 mt-0.5">Awaiting first scan...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 1. Live Clock Setup
        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').textContent = now.toLocaleTimeString('en-US', { hour12: true });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Hardware: Initialize Camera Stream
        async function initializeCamera() {
            const video = document.getElementById('webcamFeed');
            const statusDot = document.getElementById('camStatusDot');
            const statusText = document.getElementById('camStatusText');

            try {
                // Request access to the user's webcam
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
                
                statusDot.classList.replace('bg-red-500', 'bg-green-500');
                statusText.textContent = 'Optical Sensor Active';
            } catch (err) {
                console.error("Camera access denied or unavailable", err);
                statusText.textContent = 'Camera Access Denied';
            }
        }
        initializeCamera();

        // 3. Manual PIN Entry Logic (Simulation of backend hit)
        document.getElementById('manualCheckinForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pinInput = document.getElementById('studentPin');
            const pin = pinInput.value.trim();
            const msgBox = document.getElementById('checkinMessage');
            const feed = document.getElementById('activityFeed');
            
            if(pin.length < 3) return;

            // Here is where you will eventually wire up the POST /api/students/attendance/
            
            // Visual success simulation
            msgBox.textContent = "ATTENDANCE VERIFIED";
            msgBox.className = "mt-3 text-center text-xs font-medium py-2 rounded-md bg-green-900/30 text-green-400 border border-green-800 block";
            
            // Add to activity feed
            const logEntry = `
                <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl flex items-center gap-4 animate-[fade-in_0.3s_ease-out]">
                    <div class="w-10 h-10 rounded-full bg-white text-black flex items-center justify-center font-bold text-sm shrink-0">
                        ${pin.charAt(0).toUpperCase()}
                    </div>
                    <div>
                        <h4 class="text-sm font-semibold text-white">ID: ${pin}</h4>
                        <p class="text-[11px] text-gray-500 mt-0.5">Checked in at ${new Date().toLocaleTimeString()}</p>
                    </div>
                </div>
            `;
            feed.insertAdjacentHTML('afterbegin', logEntry);
            
            pinInput.value = '';
            setTimeout(() => { msgBox.classList.add('hidden'); }, 3000);
        });

        // 4. Exit Kiosk Mode
        document.getElementById('exitKioskBtn').addEventListener('click', () => {
            const stream = document.getElementById('webcamFeed').srcObject;
            if (stream) {
                stream.getTracks().forEach(track => track.stop()); // Turn off camera
            }
            window.location.href = 'schedule.html';
        });
    </script>
</body>
</html>
