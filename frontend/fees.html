<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Academy | Fee Accounting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="static/css/global.css">
    <script src="static/js/app.js"></script>
</head>
<body class="flex h-screen overflow-hidden text-[13px] antialiased selection:bg-gray-200 selection:text-black relative">


    <aside id="mainSidebar" class="fixed inset-y-0 left-0 w-60 bg-[#0A0A0A] border-r border-white/10 flex flex-col shrink-0 z-40 transform -translate-x-full transition-transform duration-200 md:relative md:translate-x-0">
        <div class="py-5 px-5 flex items-center justify-between border-b border-white/5">
            <div class="flex items-center gap-2">
                <div class="w-5 h-5 bg-white rounded-sm flex items-center justify-center text-black"><i class="ph-fill ph-shield-check text-[11px]"></i></div>
                <h1 class="font-semibold tracking-tight text-sm text-white">Scorpion Academy</h1>
            </div>
            <button onclick="toggleMobileSidebar()" class="text-gray-400 hover:text-white md:hidden p-1"><i class="ph ph-caret-left text-lg"></i></button>
        </div>
        <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
            <a href="dashboard.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-squares-four text-base"></i> Dashboard</a>
            <a href="leads.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-funnel text-base"></i> Lead Management</a>
            <a href="students.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-student text-base"></i> Students</a>
            <a href="batches.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-calendar text-base"></i> Batch Management</a>
            <a href="attendance.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-notebook text-base"></i> Attendance Log</a>
            <a href="fees.html" class="flex items-center gap-2.5 px-2.5 py-1.5 bg-white/10 text-white rounded-md transition-colors font-medium"><i class="ph-fill ph-wallet text-base"></i> Fee Accounting</a>
            <a href="exams.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-certificate text-base"></i> Belt Examinations</a>
        </nav>
        <div class="p-4 border-t border-white/5 space-y-3">
            <div class="px-2.5 py-2 bg-white/5 rounded-lg border border-white/5">
                <div id="userProfileEmail" class="text-white font-medium text-xs truncate">—</div>
                <div id="userProfileRole" class="text-gray-400 font-mono text-[9px] uppercase tracking-wider mt-0.5">—</div>
            </div>
            <button id="logoutBtn" class="flex items-center gap-2 w-full px-2.5 py-1.5 text-gray-400 hover:text-white text-left transition-colors"><i class="ph ph-sign-out text-base"></i> Log Out</button>
            <div class="text-center pt-1 border-t border-white/5">
                <a href="https://dexys.in" target="_blank" class="text-[10px] text-gray-600 hover:text-gray-400 transition-colors tracking-wide font-medium">Developed by Dexys IT Solutions</a>
            </div>
        </div>
    </aside>


    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full">
        <header class="h-14 border-b border-gray-200 flex items-center justify-between px-4 md:px-8 bg-white shrink-0 gap-4">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileSidebar()" class="p-1.5 bg-gray-50 border border-gray-200 md:hidden rounded-md"><i class="ph ph-list text-base"></i></button>
                <h2 class="font-semibold text-xs uppercase tracking-widest text-gray-400">Financial Accounting Ledger</h2>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="exportLedger()" class="border border-gray-200 hover:bg-gray-50 text-gray-700 px-3 py-1.5 rounded-md text-xs font-medium flex items-center gap-1.5 transition-colors">
                    <i class="ph ph-download"></i> Export CSV
                </button>
                <button onclick="openTransactionModal()" class="bg-black hover:bg-gray-800 text-white px-3 py-1.5 rounded-md text-xs font-medium flex items-center gap-1.5 transition-colors"><i class="ph ph-plus font-bold"></i> Record Transaction</button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[600px]">
                    <thead>
                        <tr class="bg-gray-50/50 text-[11px] font-medium text-gray-500 uppercase tracking-wider border-b border-gray-200">
                            <th class="px-5 py-3">Transaction Code</th>
                            <th class="px-5 py-3">Allocation Log</th>
                            <th class="px-5 py-3">Mode</th>
                            <th class="px-5 py-3">Target Profile ID</th>
                            <th class="px-5 py-3 text-right">Financial Amount</th>
                        </tr>
                    </thead>
                    <tbody id="feesTableBody" class="divide-y divide-gray-100 text-xs"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalBackdrop" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-40" onclick="closeTransactionModal()"></div>
    <div id="transactionModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm border border-gray-200 flex flex-col overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-white">
                <h3 class="text-xs font-semibold text-gray-900 uppercase tracking-wider">Commit Ledger Entry</h3>
                <button onclick="closeTransactionModal()" class="text-gray-400 hover:text-black"><i class="ph ph-x text-base"></i></button>
            </div>
            <form id="ledgerDataForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-[10px] font-semibold uppercase tracking-wider text-gray-500 mb-1">Student Cloud ID *</label>
                    <input type="text" id="t_student_id" required placeholder="Paste copied Cloud ID here" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs font-mono">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-semibold uppercase tracking-wider text-gray-500 mb-1">Entry Type *</label>
                        <select id="t_type" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs">
                            <option value="DEBIT">Invoice Issued (Debit)</option>
                            <option value="CREDIT">Payment Received (Credit)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-semibold uppercase tracking-wider text-gray-500 mb-1">Amount (₹) *</label>
                        <input type="number" id="t_amount" required placeholder="0.00" min="1" step="0.01" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs">
                    </div>
                </div>
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-[10px] font-semibold uppercase tracking-wider text-gray-500 mb-1">Payment Mode</label>
                        <select id="t_mode" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs">
                            <option value="UPI">UPI / QR Scan</option>
                            <option value="CASH">Liquid Cash</option>
                            <option value="BANK_TRANSFER">Bank NetTransfer</option>
                            <option value="CARD">Debit / Credit Card</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-semibold uppercase tracking-wider text-gray-500 mb-1">Allocation Description *</label>
                    <input type="text" id="t_desc" required placeholder="e.g., Monthly Karate Fee, Uniform Allocation" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs">
                </div>
                <div id="formError" class="hidden text-red-500 text-[11px] font-medium bg-red-50 py-2 rounded-md border border-red-100 text-center uppercase tracking-wide"></div>
                <button type="submit" class="w-full bg-black hover:bg-gray-800 text-white font-medium py-2 rounded-md text-xs transition-colors mt-2">Commit to Ledger</button>
            </form>
        </div>
    </div>

    <script>
        const authHeaders = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
        
        function toggleMobileSidebar() {
            document.getElementById('mainSidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarBackdrop').classList.toggle('hidden');
        }
        function openTransactionModal() { document.getElementById('transactionModal').classList.remove('hidden'); document.getElementById('modalBackdrop').classList.remove('hidden'); }
        function closeTransactionModal() { document.getElementById('transactionModal').classList.add('hidden'); document.getElementById('modalBackdrop').classList.add('hidden'); document.getElementById('ledgerDataForm').reset(); document.getElementById('formError').classList.add('hidden'); }

        async function loadLedgerData() {
            const body = document.getElementById('feesTableBody');
            body.innerHTML = `<tr><td colspan="5" class="p-5 text-gray-400 text-center animate-pulse">Syncing financials matrix...</td></tr>`;
            try {
                const res = await fetch('http://127.0.0.1:8000/api/finance/ledger/', { headers: authHeaders });
                if(res.ok) {
                    const data = await res.json();
                    body.innerHTML = '';
                    if(data.length === 0) { body.innerHTML = `<tr><td colspan="5" class="p-5 text-center text-gray-400">No transaction logs captured in active cluster.</td></tr>`; return; }
                    data.forEach(tx => {
                        const isCredit = tx.type === 'CREDIT';
                        const prefix = isCredit ? '+' : '-';
                        const colorClass = isCredit ? 'text-green-600 font-bold' : 'text-gray-900 font-semibold';
                        body.innerHTML += `
                            <tr class="hover:bg-gray-50/50 transition-colors">
                                <td class="px-5 py-3 font-mono text-gray-500">${tx._id.slice(-8)}</td>
                                <td class="px-5 py-3 font-medium text-gray-900">${tx.description}</td>
                                <td class="px-5 py-3"><span class="px-1.5 py-0.5 bg-gray-100 border border-gray-200 text-gray-600 rounded text-[10px] font-medium uppercase tracking-wide">${tx.payment_mode || 'UPI'}</span></td>
                                <td class="px-5 py-3 font-mono text-gray-400">${tx.student_id.slice(-8)}</td>
                                <td class="px-5 py-3 text-right ${colorClass}">${prefix}₹${parseFloat(tx.amount).toFixed(2)}</td>
                            </tr>`;
                    });
                }
            } catch(e) { body.innerHTML = `<tr><td colspan="5" class="p-5 text-red-500 text-center">Ledger read failure.</td></tr>`; }
        }

        async function exportLedger() {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/finance/ledger/export/', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `scorpion_ledger_${new Date().toISOString().split('T')[0]}.csv`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                }
            } catch (err) { console.error(err); }
        }

        document.getElementById('ledgerDataForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const errBox = document.getElementById('formError');
            errBox.classList.add('hidden');
            
            const payload = {
                student_id: document.getElementById('t_student_id').value.trim(),
                amount: parseFloat(document.getElementById('t_amount').value),
                type: document.getElementById('t_type').value,
                payment_mode: document.getElementById('t_mode').value,
                description: document.getElementById('t_desc').value.trim()
            };

            try {
                const res = await fetch('http://127.0.0.1:8000/api/finance/ledger/', {
                    method: 'POST',
                    headers: authHeaders,
                    body: JSON.stringify(payload)
                });
                if(res.ok) { 
                    closeTransactionModal(); 
                    loadLedgerData(); 
                } else {
                    const errorData = await res.json();
                    errBox.textContent = errorData.error || 'INVALID TRANSACTION FORMAT';
                    errBox.classList.remove('hidden');
                }
            } catch(err) { 
                errBox.textContent = 'NETWORK FAULT: CANNOT COMMIT LEDGER';
                errBox.classList.remove('hidden');
            }
        });

        loadLedgerData();
    </script>
</body>
</html>
