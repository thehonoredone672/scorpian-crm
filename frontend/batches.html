<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Academy | Batch Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FAFAFA; color: #111111; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
        input:focus, select:focus { outline: none; border-color: #000; box-shadow: 0 0 0 1px #000; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-[13px] antialiased selection:bg-gray-200 selection:text-black relative">

    <script>
        const token = localStorage.getItem('scorp_token');
        if (!token) window.location.href = 'login.html';
    </script>

    <div id="sidebarBackdrop" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-30 md:hidden" onclick="toggleMobileSidebar()"></div>

    <aside id="mainSidebar" class="fixed inset-y-0 left-0 w-60 bg-[#0A0A0A] border-r border-white/10 flex flex-col shrink-0 z-40 transform -translate-x-full transition-transform duration-200 md:relative md:translate-x-0">
        <div class="py-5 px-5 flex items-center justify-between border-b border-white/5">
            <div class="flex items-center gap-2">
                <div class="w-5 h-5 bg-white rounded-sm flex items-center justify-center text-black"><i class="ph-fill ph-shield-check text-[11px]"></i></div>
                <h1 class="font-semibold tracking-tight text-sm text-white">Scorpion Academy</h1>
            </div>
            <button onclick="toggleMobileSidebar()" class="text-gray-400 hover:text-white md:hidden p-1"><i class="ph ph-caret-left text-lg"></i></button>
        </div>
        <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
            <a href="dashboard.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-squares-four text-base"></i> Overview Metrics</a>
            <a href="leads.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-funnel text-base"></i> Lead Management</a>
            <a href="students.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-student text-base"></i> Students</a>
            <a href="batches.html" class="flex items-center gap-2.5 px-2.5 py-1.5 bg-white/10 text-white rounded-md transition-colors font-medium"><i class="ph-fill ph-calendar text-base"></i> Batch Management</a>
            <a href="attendance.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-notebook text-base"></i> Attendance Log</a>
            <a href="fees.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-wallet text-base"></i> Fee Accounting</a>
            <a href="exams.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-certificate text-base"></i> Belt Examinations</a>
        </nav>
        <div class="p-4 border-t border-white/5"><button id="logoutBtn" class="flex items-center gap-2 w-full px-2.5 py-1.5 text-gray-400 hover:text-white text-left"><i class="ph ph-sign-out text-base"></i> Terminate Link</button></div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full">
        <header class="h-14 border-b border-gray-200 flex items-center justify-between px-4 md:px-8 bg-white shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileSidebar()" class="p-1.5 bg-gray-50 border border-gray-200 md:hidden rounded-md"><i class="ph ph-list text-base"></i></button>
                <h2 class="font-semibold text-xs uppercase tracking-widest text-gray-400">Dojo Batches</h2>
            </div>
            <button onclick="openBatchModal()" class="bg-black hover:bg-gray-800 text-white px-3 py-1.5 rounded-md text-xs font-medium flex items-center gap-1.5 transition-colors"><i class="ph ph-plus font-bold"></i> Create Batch</button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div id="batchGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
    </main>

    <div id="modalBackdrop" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-40" onclick="closeBatchModal()"></div>
    <div id="batchModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm border border-gray-200 flex flex-col overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-white">
                <h3 class="text-xs font-semibold text-gray-900 uppercase tracking-wider">Configure New Training Batch</h3>
                <button onclick="closeBatchModal()" class="text-gray-400 hover:text-black"><i class="ph ph-x text-base"></i></button>
            </div>
            <form id="batchForm" class="p-6 space-y-4">
                <div><label class="block text-[10px] font-semibold uppercase tracking-wider text-gray-500 mb-1">Batch Name *</label><input type="text" id="b_name" required placeholder="e.g., Morning Warriors" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs"></div>
                <div><label class="block text-[10px] font-semibold uppercase tracking-wider text-gray-500 mb-1">Sport Type Track *</label><input type="text" id="b_sport" required placeholder="e.g., Karate / Silambam" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-[10px] font-semibold uppercase tracking-wider text-gray-500 mb-1">Start Time *</label><input type="text" id="b_start" required placeholder="06:00" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs"></div>
                    <div><label class="block text-[10px] font-semibold uppercase tracking-wider text-gray-500 mb-1">End Time *</label><input type="text" id="b_end" required placeholder="07:30" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs"></div>
                </div>
                <button type="submit" class="w-full bg-black hover:bg-gray-800 text-white font-medium py-2 rounded-md text-xs transition-colors">Commit Batch</button>
            </form>
        </div>
    </div>

    <script>
        const authHeaders = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
        function toggleMobileSidebar() {
            document.getElementById('mainSidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarBackdrop').classList.toggle('hidden');
        }
        function openBatchModal() { document.getElementById('batchModal').classList.remove('hidden'); document.getElementById('modalBackdrop').classList.remove('hidden'); }
        function closeBatchModal() { document.getElementById('batchModal').classList.add('hidden'); document.getElementById('modalBackdrop').classList.add('hidden'); document.getElementById('batchForm').reset(); }

        async function fetchBatches() {
            const grid = document.getElementById('batchGrid');
            grid.innerHTML = `<p class="text-gray-400 animate-pulse col-span-full">Syncing training partitions...</p>`;
            try {
                const res = await fetch('http://127.0.0.1:8000/api/branches/', { headers: authHeaders }); // Re-routed via local configurations
                if(res.ok) {
                    const branches = await res.json();
                    grid.innerHTML = '';
                    if(branches.length === 0) { grid.innerHTML = `<p class="text-gray-400 col-span-full">No active batches mapped.</p>`; return; }
                    branches.forEach(b => {
                        grid.innerHTML += `
                            <div class="p-5 bg-white border border-gray-200 rounded-xl shadow-sm flex flex-col justify-between">
                                <div>
                                    <div class="flex justify-between items-start mb-2">
                                        <span class="px-1.5 py-0.5 bg-gray-100 text-gray-600 rounded text-[9px] font-bold uppercase">${b.branch_code}</span>
                                        <span class="text-xs font-semibold text-gray-900">Live Track</span>
                                    </div>
                                    <h3 class="text-sm font-semibold text-gray-900">${b.name}</h3>
                                    <p class="text-[11px] text-gray-400 mt-1">Location: ${b.address.city}</p>
                                </div>
                            </div>`;
                    });
                }
            } catch(e) { grid.innerHTML = `<p class="text-red-500 col-span-full">API Context drop.</p>`; }
        }

        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.href = 'login.html'; });
        fetchBatches();
    </script>
</body>
</html>
