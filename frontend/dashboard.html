<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Academy | Dashboard</title>
    <style>html, body { background-color: #FAFAFA !important; margin: 0; padding: 0; } @media (min-width: 768px) { #global-sidebar-container { background-color: #0A0A0A !important; min-width: 15rem; } }</style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./static/css/global.css">
    <script src="./static/js/app.js"></script>
</head>
<body class="flex h-screen overflow-hidden text-[13px] antialiased">
    <div id="global-sidebar-container" class="flex flex-col h-full shrink-0"></div>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto w-full bg-[#FAFAFA] relative">
        <header class="h-14 border-b border-gray-200 flex items-center justify-between px-4 md:px-8 bg-white shrink-0">
            <h2 class="font-semibold text-xs uppercase tracking-widest text-gray-400">Dashboard Overview</h2>
            <div id="headerDate" class="text-[10px] font-mono text-gray-500 uppercase bg-gray-50 px-3 py-1 rounded border border-gray-200"></div>
        </header>

        <div class="p-4 md:p-8 space-y-8" id="dashboardContainer">
            <div class="text-center text-gray-400 py-10 animate-pulse font-mono text-xs">Loading metrics...</div>
        </div>
    </main>

    <script>
        const authHeaders = { 'Authorization': `Bearer ${localStorage.getItem('scorp_token')}`, 'Content-Type': 'application/json' };
        document.getElementById('headerDate').innerText = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric', weekday: 'long' });

        async function initDashboard() {
            try {
                const res = await fetch('http://127.0.0.1:8000/api/dashboard/metrics/', { headers: authHeaders });
                const data = await res.json();
                const container = document.getElementById('dashboardContainer');

                if (data.view_type === 'ADMIN') {
                    // =======================================
                    // SUPER ADMIN VIEW (White Cards + 3-Col Branches)
                    // =======================================
                    let branchesHtml = data.metrics.branches.map(b => `
                        <div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm flex flex-col hover:border-gray-300 transition-colors">
                            <div class="flex justify-between items-start border-b border-gray-100 pb-3 mb-4">
                                <div>
                                    <h4 class="font-bold text-gray-900 flex items-center gap-2"><i class="ph ph-buildings text-lg text-gray-400"></i> ${b.name}</h4>
                                    <p class="text-[10px] text-gray-500 font-medium mt-1 flex items-center gap-1.5"><i class="ph ph-chalkboard-teacher text-sm"></i> ${b.instructors}</p>
                                </div>
                                <span class="text-[10px] text-gray-500 font-medium bg-gray-50 border border-gray-100 px-2 py-0.5 rounded shrink-0">${b.students} Students</span>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4 mb-4">
                                <div><p class="text-[10px] text-gray-500 mb-0.5">Present Today:</p><p class="font-black text-gray-900 text-base">${b.present}</p></div>
                                <div><p class="text-[10px] text-gray-500 mb-0.5">Absent Today:</p><p class="font-black text-gray-900 text-base">${b.absent}</p></div>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4 border-t border-gray-100 pt-4 mb-4">
                                <div><p class="text-[10px] text-gray-500 mb-0.5">Collected (Mo):</p><p class="font-black text-green-600 text-base">₹${b.collected.toLocaleString()}</p></div>
                                <div><p class="text-[10px] text-gray-500 mb-0.5">Pending (Mo):</p><p class="font-black text-red-500 text-base">₹${b.pending.toLocaleString()}</p></div>
                            </div>
                            
                            <div class="mt-auto">
                            ${b.alert_count > 0 ? 
                                `<div class="bg-red-50 border border-red-100 text-red-600 text-[10px] font-bold uppercase tracking-wider p-2 rounded flex items-center justify-center gap-1.5"><i class="ph ph-warning-circle text-sm"></i> ${b.alert_count} STUDENTS PENDING</div>` 
                                : 
                                `<div class="bg-green-50 border border-green-100 text-green-600 text-[10px] font-bold uppercase tracking-wider p-2 rounded flex items-center justify-center gap-1.5"><i class="ph ph-check-circle text-sm"></i> NO PENDING DUES</div>`
                            }
                            </div>
                        </div>
                    `).join('');

                    container.innerHTML = `
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="bg-white border border-gray-200 p-5 rounded-xl shadow-sm flex flex-col justify-between">
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Total Active Students</p>
                                <h3 class="text-4xl font-black text-gray-900">${data.metrics.total_active}</h3>
                            </div>
                            <div class="bg-white border border-gray-200 p-5 rounded-xl shadow-sm flex flex-col justify-between">
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Total Instructors</p>
                                <h3 class="text-4xl font-black text-gray-900">${data.metrics.total_instructors}</h3>
                            </div>
                            <div class="bg-white border border-gray-200 p-5 rounded-xl shadow-sm flex flex-col justify-between">
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Collected (This Month)</p>
                                <h3 class="text-4xl font-black text-green-600">₹${data.metrics.collected_month.toLocaleString()}</h3>
                            </div>
                            <div class="bg-white border border-gray-200 p-5 rounded-xl shadow-sm flex flex-col justify-between">
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Pending (This Month)</p>
                                <h3 class="text-4xl font-black text-red-600">₹${data.metrics.pending_month.toLocaleString()}</h3>
                            </div>
                        </div>

                        <div class="mt-8">
                            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Branches Overview</h3>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                ${branchesHtml || '<p class="text-xs text-gray-400">No branches configured.</p>'}
                            </div>
                        </div>
                    `;
                } else {
                    // =======================================
                    // INSTRUCTOR VIEW (Charts & Branch Metrics)
                    // =======================================
                    container.innerHTML = `
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="bg-white border border-gray-200 p-5 rounded-xl shadow-sm"><p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Total Students</p><h3 class="text-3xl font-black text-gray-900">${data.metrics.total_students}</h3></div>
                            <div class="bg-white border border-gray-200 p-5 rounded-xl shadow-sm"><p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Active Students</p><h3 class="text-3xl font-black text-green-600">${data.metrics.active_students}</h3></div>
                            <div class="bg-white border border-gray-200 p-5 rounded-xl shadow-sm"><p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Pending (Fees Due)</p><h3 class="text-3xl font-black text-orange-500">${data.metrics.pending_students}</h3></div>
                            <div class="bg-white border border-gray-200 p-5 rounded-xl shadow-sm"><p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Attendance Rate</p><h3 class="text-3xl font-black text-blue-600">${data.metrics.attendance_rate}%</h3></div>
                        </div>
                        <div class="bg-white border border-gray-200 p-6 rounded-xl shadow-sm">
                            <div class="flex justify-between items-center mb-6"><h3 class="text-xs font-bold text-gray-900 uppercase tracking-wider">Annual Growth & Revenue</h3></div>
                            <div class="relative h-[350px] w-full"><canvas id="dashboardChart"></canvas></div>
                        </div>
                    `;

                    const ctx = document.getElementById('dashboardChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: data.chart.labels,
                            datasets: [
                                { label: 'Fees Collected (₹)', data: data.chart.fees, backgroundColor: '#10b981', borderRadius: 4, yAxisID: 'y' },
                                { label: 'Active Student Count', data: data.chart.students, type: 'line', borderColor: '#000000', backgroundColor: '#000000', borderWidth: 3, pointRadius: 4, tension: 0.3, yAxisID: 'y1' }
                            ]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
                            scales: {
                                x: { grid: { display: false } },
                                y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Revenue (₹)', font: { size: 10, weight: 'bold' } }, grid: { borderDash: [4, 4] } },
                                y1: { type: 'linear', display: true, position: 'right', title: { display: true, text: 'Students', font: { size: 10, weight: 'bold' } }, grid: { drawOnChartArea: false } }
                            },
                            plugins: { legend: { labels: { usePointStyle: true, boxWidth: 8, font: { size: 11, family: 'Inter' } } } }
                        }
                    });
                }
            } catch(e) {
                document.getElementById('dashboardContainer').innerHTML = '<div class="text-center text-red-500 py-10 font-mono text-xs">Failed to load dashboard metrics.</div>';
            }
        }

        initDashboard();
    </script>
</body>
</html>
