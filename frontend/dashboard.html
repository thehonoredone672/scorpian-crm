<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Academy | Dashboard</title>
    
    <!-- ZERO-FLASH FIX: Paints background instantly before CDN loads -->
    <style>
        html, body { background-color: #FAFAFA !important; margin: 0; padding: 0; }
        /* Only enforce the 15rem width on Desktop/Tablets */
        @media (min-width: 768px) { 
            #global-sidebar-container { background-color: #0A0A0A !important; min-width: 15rem; } 
        }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./static/css/global.css">
    <script src="./static/js/app.js"></script>
</head>
<body class="flex h-screen overflow-hidden text-[13px] antialiased">
    <!-- Global Sidebar dynamically injected here -->
    <div id="global-sidebar-container" class="flex flex-col h-full shrink-0"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full bg-[#FAFAFA]">
        <header class="h-14 border-b border-gray-200 flex items-center px-4 md:px-8 bg-white shrink-0 justify-between">
            <h2 class="font-semibold text-xs uppercase tracking-widest text-gray-400">Dashboard Overview</h2>
            <span id="scopeBadge" class="px-2 py-0.5 bg-gray-100 border text-gray-600 font-mono rounded text-[10px] font-bold uppercase hidden sm:block"></span>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8 space-y-8">
            
            <!-- Dynamic Layout Engine (Controlled by app.js classes) -->
            <div id="metrics-grid" class="metrics-container">
                
                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex-col justify-between admin-only">
                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Total Active Students</div>
                    <div class="flex items-end justify-between"><div id="val_total_students" class="text-3xl font-semibold text-gray-900 tracking-tight">0</div><i class="ph ph-users text-2xl text-gray-300"></i></div>
                </div>

                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex-col justify-between admin-only">
                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Total Instructors</div>
                    <div class="flex items-end justify-between"><div id="val_total_instructors" class="text-3xl font-semibold text-gray-900 tracking-tight">0</div><i class="ph ph-chalkboard-teacher text-2xl text-gray-300"></i></div>
                </div>

                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-between">
                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Collected (This Month)</div>
                    <div class="flex items-end justify-between"><div class="text-3xl font-semibold text-gray-900 tracking-tight">₹<span id="val_collected">0</span></div></div>
                </div>

                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-between">
                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Pending (This Month)</div>
                    <div class="flex items-end justify-between"><div class="text-3xl font-semibold text-red-600 tracking-tight">₹<span id="val_pending">0</span></div></div>
                </div>
            </div>

            <!-- Branches Overview (Admin Only) -->
            <div id="branchGridContainer" class="space-y-4 admin-block">
                <h4 class="text-[11px] font-bold text-gray-400 uppercase tracking-widest border-b pb-2">Branches Overview</h4>
                <div id="branchGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Fetched dynamically -->
                </div>
            </div>
        </div>
    </main>

    <script>
        const daysArray = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const currentDate = new Date();
        document.getElementById('scopeBadge').innerText = `${currentDate.getDate()} ${currentDate.toLocaleString('default', { month: 'long' })} ${currentDate.getFullYear()}, ${daysArray[currentDate.getDay()]}`.toUpperCase();

        const authHeaders = { 'Authorization': `Bearer ${localStorage.getItem('scorp_token')}`, 'Content-Type': 'application/json' };

        async function fetchDashboardExecution() {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/dashboard/metrics/', { headers: authHeaders });
                if(!response.ok) return;
                
                const data = await response.json();
                
                // Sanitized Name Caching (Fixes 'undefined' bug)
                if (data.name && data.name !== 'undefined' && data.name !== 'null') {
                    localStorage.setItem('scorp_real_name', data.name);
                    const sidebarNameEl = document.getElementById('sidebar-user-name');
                    if(sidebarNameEl) sidebarNameEl.innerText = data.name;
                }

                const summary = data.summary;
                document.getElementById('val_collected').innerText = summary.collected.toLocaleString('en-IN');
                document.getElementById('val_pending').innerText = summary.pending.toLocaleString('en-IN');

                if(data.role === 'SUPER_ADMIN') {
                    document.getElementById('val_total_students').innerText = summary.total_students;
                    document.getElementById('val_total_instructors').innerText = summary.total_instructors;

                    const gridBody = document.getElementById('branchGrid');
                    gridBody.innerHTML = '';
                    
                    if (!data.branches || data.branches.length === 0) {
                        gridBody.innerHTML = '<div class="col-span-full bg-gray-50 border border-gray-200 text-gray-500 rounded-xl p-6 text-center text-xs font-medium">No active branches configured in system.</div>';
                    } else {
                        data.branches.forEach(b => {
                            const s = b.stats;
                            let pendingAlert = '';
                            if (s.pending_students_count > 0) {
                                pendingAlert = `<div class="col-span-2 mt-2 bg-red-50 border border-red-200 text-red-600 px-2 py-1.5 rounded text-[10px] font-bold uppercase flex items-center gap-1.5"><i class="ph-fill ph-warning-circle"></i> Alert: ${s.pending_students_count} students pending (${s.total_pending_months} months total)</div>`;
                            }

                            gridBody.innerHTML += `
                                <div class="bg-white border border-gray-200 p-5 rounded-xl shadow-sm flex flex-col hover:border-black transition-colors">
                                    <div class="flex justify-between items-center border-b pb-2 mb-3">
                                        <div class="font-bold text-gray-900 text-xs uppercase tracking-wide flex items-center gap-1.5"><i class="ph ph-buildings text-gray-400 text-sm"></i> ${b.branch_name}</div>
                                        <div class="bg-gray-100 px-2 py-0.5 rounded font-mono text-[10px] font-bold text-gray-600">${s.total_students} Students</div>
                                    </div>
                                    <div class="grid grid-cols-2 gap-x-2 gap-y-3 text-[11px] font-medium flex-1">
                                        <div class="text-gray-500">Present Today: <br><span class="text-black font-bold font-mono text-sm">${s.present}</span></div>
                                        <div class="text-gray-500">Absent Today: <br><span class="text-black font-bold font-mono text-sm">${s.absent}</span></div>
                                        <div class="text-gray-500 pt-2 border-t border-dashed">Collected (Mo): <br><span class="text-green-600 font-bold font-mono">₹${s.collected.toLocaleString('en-IN')}</span></div>
                                        <div class="text-gray-500 pt-2 border-t border-dashed">Pending (Mo): <br><span class="text-red-500 font-bold font-mono">₹${s.pending.toLocaleString('en-IN')}</span></div>
                                        ${pendingAlert}
                                    </div>
                                </div>`;
                        });
                    }
                }
            } catch(err) { console.error(err); }
        }
        fetchDashboardExecution();
    </script>
</body>
</html>
