<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Academy | Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FAFAFA; color: #111111; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
        input:focus { outline: none; border-color: #000; box-shadow: 0 0 0 1px #000; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-[13px] antialiased selection:bg-gray-200 selection:text-black relative">

    <script>
        const token = localStorage.getItem('scorp_token');
        if (!token) window.location.href = 'login.html';
    </script>

    <div id="sidebarBackdrop" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-30 md:hidden" onclick="toggleMobileSidebar()"></div>

    <aside id="mainSidebar" class="fixed inset-y-0 left-0 w-60 bg-[#0A0A0A] border-r border-white/10 flex flex-col shrink-0 z-40 transform -translate-x-full transition-transform duration-200 md:relative md:translate-x-0">
        <div class="py-5 px-5 flex items-center justify-between border-b border-white/5">
            <div class="flex items-center gap-2"><div class="w-5 h-5 bg-white rounded-sm flex items-center justify-center text-black"><i class="ph-fill ph-shield-check text-[11px]"></i></div><h1 class="font-semibold tracking-tight text-sm text-white">Scorpion Academy</h1></div>
            <button onclick="toggleMobileSidebar()" class="text-gray-400 hover:text-white md:hidden p-1"><i class="ph ph-caret-left text-lg"></i></button>
        </div>
        <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
            <a href="dashboard.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-squares-four text-base"></i> Overview Metrics</a>
            <a href="leads.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-funnel text-base"></i> Lead Management</a>
            <a href="students.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-student text-base"></i> Students</a>
            <a href="batches.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-calendar text-base"></i> Batch Management</a>
            <a href="attendance.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-notebook text-base"></i> Attendance Log</a>
            <a href="fees.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-wallet text-base"></i> Fee Accounting</a>
            <a href="exams.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-certificate text-base"></i> Belt Examinations</a>
            <a href="events.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-trophy text-base"></i> Event Management</a>
            <a href="vault.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-folder text-base"></i> Document Vault</a>
            <a href="settings.html" class="flex items-center gap-2.5 px-2.5 py-1.5 bg-white/10 text-white rounded-md transition-colors font-medium"><i class="ph-fill ph-gear text-base"></i> Settings Configuration</a>
        </nav>
        <div class="p-4 border-t border-white/5"><button id="logoutBtn" class="flex items-center gap-2 w-full px-2.5 py-1.5 text-gray-400 hover:text-white text-left"><i class="ph ph-sign-out text-base"></i> Terminate Link</button></div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full">
        <header class="h-14 border-b border-gray-200 flex items-center justify-between px-4 md:px-8 bg-white shrink-0">
            <h2 class="font-semibold text-xs uppercase tracking-widest text-gray-400">Academy Configuration Profile</h2>
        </header>
        <div class="flex-1 overflow-y-auto p-4 md:p-8 max-w-xl">
            <form class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 space-y-4">
                <div><label class="block text-[10px] font-semibold uppercase tracking-wider text-gray-500 mb-1">Academy Name Parameter</label><input type="text" value="Scorpion Academy" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs"></div>
                <div><label class="block text-[10px] font-semibold uppercase tracking-wider text-gray-500 mb-1">WhatsApp Integration Number</label><input type="text" value="+91 98765 43210" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs"></div>
                <button type="button" class="bg-black hover:bg-gray-800 text-white px-4 py-2 rounded-md text-xs font-medium transition-colors">Update Workspace Settings</button>
            </form>
        </div>
    </main>

    <script>
        function toggleMobileSidebar() {
            document.getElementById('mainSidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarBackdrop').classList.toggle('hidden');
        }
        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.href = 'login.html'; });
    </script>
</body>
</html>
