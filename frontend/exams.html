<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Academy | Belt Exams</title>

    <!-- ZERO-FLASH FIX -->
    <style>
        html, body { background-color: #FAFAFA !important; margin: 0; padding: 0; }
        #global-sidebar-container { background-color: #0A0A0A !important; min-width: 15rem; }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./static/css/global.css">
    <script src="./static/js/app.js"></script>
</head>
<body class="flex h-screen overflow-hidden text-[13px] antialiased">
    <div id="global-sidebar-container" class="flex flex-col h-full shrink-0"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full bg-[#FAFAFA]">
        <header class="h-14 border-b border-gray-200 flex items-center px-4 md:px-8 bg-white shrink-0">
            <h2 class="font-semibold text-xs uppercase tracking-widest text-gray-400">Promotion Control Board</h2>
        </header>
        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[700px]">
                    <thead>
                        <tr class="bg-gray-50/50 text-[11px] font-medium text-gray-500 uppercase tracking-wider border-b border-gray-200">
                            <th class="px-5 py-3">Student Name</th>
                            <th class="px-5 py-3">Current Belt Level</th>
                            <th class="px-5 py-3 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="examBody" class="divide-y divide-gray-100 text-xs"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const authHeaders = { 'Authorization': `Bearer ${localStorage.getItem('scorp_token')}`, 'Content-Type': 'application/json' };
        
        // Exact 9-Tier Karate Ranking Ladder
        const belts = ["WHITE", "YELLOW", "ORANGE", "BLUE", "GREEN", "PURPLE", "BROWN 1", "BROWN 2", "BLACK 1"];

        async function loadExams() {
            const body = document.getElementById('examBody');
            try {
                const res = await fetch('http://127.0.0.1:8000/api/students/', { headers: authHeaders });
                const students = await res.json();
                body.innerHTML = '';
                if(students.length === 0) { body.innerHTML = '<tr><td colspan="3" class="p-5 text-center text-gray-400">No students eligible.</td></tr>'; return; }
                
                students.forEach(s => {
                    const currentIdx = belts.indexOf(s.current_belt.toUpperCase());
                    const nextBelt = (currentIdx >= 0 && currentIdx < belts.length - 1) ? belts[currentIdx + 1] : "MAX RANK";
                    
                    const btn = nextBelt !== "MAX RANK" 
                        ? `<button onclick="promote('${s.id}', '${nextBelt}')" class="bg-black text-white px-3 py-1 rounded text-[10px] font-bold uppercase tracking-wider hover:bg-gray-800 transition-colors">Promote to ${nextBelt}</button>`
                        : `<span class="px-2 py-1 bg-gray-100 text-gray-400 rounded text-[10px] font-bold uppercase tracking-wider">Master Rank</span>`;

                    body.innerHTML += `
                        <tr class="hover:bg-gray-50/50 transition-colors">
                            <td class="px-5 py-4 font-medium text-gray-900">${s.first_name} ${s.last_name}</td>
                            <td class="px-5 py-4"><span class="font-mono text-[10px] font-bold px-2 py-0.5 border rounded uppercase">${s.current_belt}</span></td>
                            <td class="px-5 py-4 text-right">${btn}</td>
                        </tr>`;
                });
            } catch(e) {}
        }

        async function promote(studentId, newBelt) {
            try {
                await fetch('http://127.0.0.1:8000/api/students/promote/', {
                    method: 'POST', headers: authHeaders,
                    body: JSON.stringify({ student_id: studentId, new_belt: newBelt })
                });
                loadExams();
            } catch(e) { alert("Failed to promote student."); }
        }
        loadExams();
    </script>
</body>
</html>
