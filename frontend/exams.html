<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Academy | Belt Examinations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="static/css/global.css">
    <script src="static/js/app.js"></script>
</head>
<body class="flex h-screen overflow-hidden text-[13px] antialiased selection:bg-gray-200 selection:text-black relative">


    <aside id="mainSidebar" class="fixed inset-y-0 left-0 w-60 bg-[#0A0A0A] border-r border-white/10 flex flex-col shrink-0 z-40 transform -translate-x-full transition-transform duration-200 md:relative md:translate-x-0">
        <div class="py-5 px-5 flex items-center justify-between border-b border-white/5">
            <div class="flex items-center gap-2"><div class="w-5 h-5 bg-white rounded-sm flex items-center justify-center text-black"><i class="ph-fill ph-shield-check text-[11px]"></i></div><h1 class="font-semibold tracking-tight text-sm text-white">Scorpion Academy</h1></div>
            <button onclick="toggleMobileSidebar()" class="text-gray-400 hover:text-white md:hidden p-1"><i class="ph ph-caret-left text-lg"></i></button>
        </div>
        <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
            <a href="dashboard.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-squares-four text-base"></i> Dashboard</a>
            <a href="leads.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-funnel text-base"></i> Lead Management</a>
            <a href="students.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-student text-base"></i> Students</a>
            <a href="batches.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-calendar text-base"></i> Batch Management</a>
            <a href="attendance.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-notebook text-base"></i> Attendance Log</a>
            <a href="fees.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-wallet text-base"></i> Fee Accounting</a>
            <a href="exams.html" class="flex items-center gap-2.5 px-2.5 py-1.5 bg-white/10 text-white rounded-md transition-colors font-medium"><i class="ph-fill ph-certificate text-base"></i> Belt Examinations</a>
        </nav>
        <div class="p-4 border-t border-white/5 space-y-3">
            <div class="px-2.5 py-2 bg-white/5 rounded-lg border border-white/5">
                <div id="userProfileEmail" class="text-white font-medium text-xs truncate">—</div>
                <div id="userProfileRole" class="text-gray-400 font-mono text-[9px] uppercase tracking-wider mt-0.5">—</div>
            </div>
            <button id="logoutBtn" class="flex items-center gap-2 w-full px-2.5 py-1.5 text-gray-400 hover:text-white text-left transition-colors"><i class="ph ph-sign-out text-base"></i> Log Out</button>
            <div class="text-center pt-1 border-t border-white/5">
                <a href="https://dexys.in" target="_blank" class="text-[10px] text-gray-600 hover:text-gray-400 transition-colors tracking-wide font-medium">Developed by Dexys IT Solutions</a>
            </div>
        </div>
    </aside>


    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full">
        <header class="h-14 border-b border-gray-200 flex items-center justify-between px-4 md:px-8 bg-white shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileSidebar()" class="p-1.5 bg-gray-50 border border-gray-200 md:hidden rounded-md"><i class="ph ph-list text-base"></i></button>
                <h2 class="font-semibold text-xs uppercase tracking-widest text-gray-400">Grading Eligibility Index</h2>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[650px]">
                    <thead>
                        <tr class="bg-gray-50/50 text-[11px] font-medium text-gray-500 uppercase tracking-wider border-b border-gray-200">
                            <th class="px-5 py-3">Student Name</th>
                            <th class="px-5 py-3">Current Rank Status</th>
                            <th class="px-5 py-3">Logged Attendance Parameters</th>
                            <th class="px-5 py-3 text-right">Evaluation Action</th>
                        </tr>
                    </thead>
                    <tbody id="examsTableBody" class="divide-y divide-gray-100 text-xs"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const authHeaders = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
        
        function toggleMobileSidebar() {
            document.getElementById('mainSidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarBackdrop').classList.toggle('hidden');
        }

        async function fetchProgressionData() {
            const body = document.getElementById('examsTableBody');
            body.innerHTML = `<tr><td colspan="4" class="p-5 text-gray-400 text-center animate-pulse">Computing system evaluation parameters...</td></tr>`;
            try {
                const res = await fetch('http://127.0.0.1:8000/api/sports/progression/', { headers: authHeaders });
                if(res.ok) {
                    const data = await res.json();
                    body.innerHTML = '';
                    if(data.length === 0) { body.innerHTML = `<tr><td colspan="4" class="p-5 text-center text-gray-400">No active students to evaluate.</td></tr>`; return; }
                    
                    data.forEach(item => {
                        const isEligible = item.status === 'ELIGIBLE';
                        const badgeColor = isEligible ? 'bg-green-50 text-green-700 border-green-200' : 'bg-gray-50 text-gray-500 border-gray-200';
                        const actionButton = isEligible 
                            ? `<button onclick="promoteStudent('${item.id}', '${item.current_belt}')" class="px-2.5 py-1 bg-black text-white rounded font-medium hover:bg-gray-800 transition-colors">Promote</button>`
                            : `<span class="text-gray-400 font-medium">Hours Insufficient</span>`;

                        body.innerHTML += `
                            <tr class="hover:bg-gray-50/50 transition-colors">
                                <td class="px-5 py-3 font-medium text-gray-900">${item.name}</td>
                                <td class="px-5 py-3"><span class="font-semibold font-mono tracking-wide uppercase">${item.current_belt} BELT</span></td>
                                <td class="px-5 py-3 text-gray-500 font-medium">${item.attendance_count} Present Session(s)</td>
                                <td class="px-5 py-3 text-right flex justify-end items-center gap-3">
                                    <span class="px-2 py-0.5 border text-[10px] font-bold tracking-wider rounded uppercase ${badgeColor}">${item.status}</span>
                                    ${actionButton}
                                </td>
                            </tr>`;
                    });
                }
            } catch(e) { body.innerHTML = `<tr><td colspan="4" class="p-5 text-red-500 text-center">Progression read transaction failure.</td></tr>`; }
        }

        async function promoteStudent(studentId, currentBelt) {
            let nextBelt = "YELLOW";
            if(currentBelt === "YELLOW") nextBelt = "GREEN";
            if(currentBelt === "GREEN") nextBelt = "BLACK";

            if(!confirm(`Are you sure you want to promote this student to ${nextBelt} Belt?`)) return;

            try {
                const res = await fetch('http://127.0.0.1:8000/api/sports/progression/', {
                    method: 'POST',
                    headers: authHeaders,
                    body: JSON.stringify({ student_id: studentId, next_belt: nextBelt })
                });
                if(res.ok) {
                    alert(`Promotion logged! Student upgraded to ${nextBelt} Belt.`);
                    fetchProgressionData();
                }
            } catch(err) { console.error("Promotion failed:", err); }
        }

        fetchProgressionData();
    </script>
</body>
</html>
