<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Academy | Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./static/css/global.css">
    <script src="./static/js/app.js"></script>
</head>
<body class="flex h-screen overflow-hidden text-[13px] antialiased">
    <div id="global-sidebar-container" class="h-full shrink-0"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full bg-[#FAFAFA]">
        <header class="h-14 border-b border-gray-200 flex items-center px-8 bg-white shrink-0">
            <h2 class="font-semibold text-xs uppercase tracking-widest text-gray-400">Daily Attendance Tracking</h2>
        </header>
        <div class="flex-1 overflow-y-auto p-8">
            <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm max-w-2xl">
                <div class="flex items-start justify-between border-b pb-4 mb-4">
                    <div><span class="px-1.5 py-0.5 bg-black text-white rounded text-[9px] font-bold uppercase">Daily Log</span><h3 class="text-sm font-bold text-gray-900 mt-1.5">Today's Roll Call</h3></div>
                    <span class="text-xs font-semibold text-gray-500 font-mono bg-gray-100 px-2.5 py-1 rounded border" id="attDateDisplay"></span>
                </div>
                <table class="w-full text-left">
                    <thead><tr class="text-[10px] font-bold text-gray-400 uppercase border-b pb-2"><th class="pb-2">Student Name</th><th class="pb-2 text-right">Update Action</th></tr></thead>
                    <tbody id="attendanceBody" class="divide-y text-xs"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('attDateDisplay').innerText = `Date: ${new Date().toLocaleDateString('en-IN')}`;
        const authHeaders = { 'Authorization': `Bearer ${localStorage.getItem('scorp_token')}`, 'Content-Type': 'application/json' };

        async function loadRollCallData() {
            const body = document.getElementById('attendanceBody');
            try {
                const res = await fetch('http://127.0.0.1:8000/api/sessions/000000000000000000000000/checkin/', { headers: authHeaders });
                const data = await res.json();
                body.innerHTML = '';
                if(data.length === 0) { body.innerHTML = '<tr><td colspan="2" class="py-4 text-center text-gray-500">No active students to track.</td></tr>'; return; }
                data.forEach(s => {
                    body.innerHTML += `
                        <tr class="hover:bg-gray-50/50"><td class="py-3 font-medium text-gray-900">${s.name} <span class="text-[10px] font-mono text-gray-400 ml-2 uppercase">${s.current_belt}</span></td>
                        <td class="py-3 text-right">
                            <select onchange="updateAttendanceStatus('${s.student_id}', this.value)" class="bg-gray-50 border px-2 py-1 rounded text-xs font-medium cursor-pointer">
                                <option value="NOT_MARKED" ${s.status==='NOT_MARKED'?'selected':''}>Not Marked</option>
                                <option value="PRESENT" ${s.status==='PRESENT'?'selected':''}>Present</option>
                                <option value="ABSENT" ${s.status==='ABSENT'?'selected':''}>Absent</option>
                            </select>
                        </td></tr>`;
                });
            } catch(e) { body.innerHTML = '<tr><td colspan="2" class="py-4 text-center text-red-500">Sync Failed</td></tr>'; }
        }

        async function updateAttendanceStatus(studentId, statusValue) {
            if(statusValue === 'NOT_MARKED') return;
            await fetch(`http://127.0.0.1:8000/api/sessions/000000000000000000000000/checkin/`, {
                method: 'POST', headers: authHeaders, body: JSON.stringify({ student_id: studentId, status: statusValue })
            });
        }
        loadRollCallData();
    </script>
</body>
</html>
