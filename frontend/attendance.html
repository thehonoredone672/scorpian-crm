<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Academy | Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="static/css/global.css">
    <script src="static/js/app.js"></script>
</head>
<body class="flex h-screen overflow-hidden text-[13px] antialiased">


    <aside id="mainSidebar" class="fixed inset-y-0 left-0 w-60 bg-[#0A0A0A] border-r border-white/10 flex flex-col shrink-0 z-40 md:relative">
        <div class="py-5 px-5 flex items-center justify-between border-b border-white/5"><div class="flex items-center gap-2"><div class="w-5 h-5 bg-white rounded-sm flex items-center justify-center text-black"><i class="ph-fill ph-shield-check text-[11px]"></i></div><h1 class="font-semibold tracking-tight text-sm text-white">Scorpion Academy</h1></div></div>
        <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
            <a href="dashboard.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md font-medium"><i class="ph ph-squares-four text-base"></i> Dashboard</a>
            <a href="leads.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md font-medium"><i class="ph ph-funnel text-base"></i> Lead Management</a>
            <a href="students.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md font-medium"><i class="ph ph-student text-base"></i> Students</a>
            <a href="attendance.html" class="flex items-center gap-2.5 px-2.5 py-1.5 bg-white/10 text-white rounded-md font-medium"><i class="ph-fill ph-notebook text-base"></i> Attendance Log</a>
            <a href="fees.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md font-medium"><i class="ph ph-wallet text-base"></i> Fee Accounting</a>
            <a href="exams.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md font-medium"><i class="ph ph-certificate text-base"></i> Belt Examinations</a>
            <a href="instructors.html" id="nav-staff" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md font-medium"><i class="ph ph-chalkboard-teacher text-base"></i> Staff Management</a>
        </nav>
        <div class="p-4 border-t border-white/5 space-y-3">
            <div class="px-2.5 py-2 bg-white/5 rounded-lg border border-white/5">
                <div id="userProfileEmail" class="text-white font-medium text-xs truncate">—</div>
                <div id="userProfileRole" class="text-gray-400 font-mono text-[9px] uppercase tracking-wider mt-0.5">—</div>
            </div>
            <button id="logoutBtn" class="flex items-center gap-2 w-full px-2.5 py-1.5 text-gray-400 hover:text-white text-left transition-colors"><i class="ph ph-sign-out text-base"></i> Log Out</button>
            <div class="text-center pt-1 border-t border-white/5">
                <a href="https://dexys.in" target="_blank" class="text-[10px] text-gray-600 hover:text-gray-400 transition-colors tracking-wide font-medium">Developed by Dexys IT Solutions</a>
            </div>
        </div>
    </aside>


    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full">
        <header class="h-14 border-b border-gray-200 flex items-center px-8 bg-white shrink-0">
            <h2 class="font-semibold text-xs uppercase tracking-widest text-gray-400">Daily Attendance Tracking</h2>
        </header>
        <div class="flex-1 overflow-y-auto p-8">
            <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm max-w-2xl">
                <div class="flex items-start justify-between border-b pb-4 mb-4">
                    <div><span class="px-1.5 py-0.5 bg-black text-white rounded text-[9px] font-bold uppercase">Main Dojo</span><h3 class="text-sm font-bold text-gray-900 mt-1.5">Today's Roll Call</h3></div>
                    <span class="text-xs font-semibold text-gray-500 font-mono bg-gray-100 px-2.5 py-1 rounded border">Date: ${new Date().toLocaleDateString('en-IN')}</span>
                </div>
                <table class="w-full text-left">
                    <thead><tr class="text-[10px] font-bold text-gray-400 uppercase border-b pb-2"><th class="pb-2">Student Name</th><th class="pb-2 text-right">Update Action</th></tr></thead>
                    <tbody id="attendanceRollCallBody" class="divide-y text-xs"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const authHeaders = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };


        async function loadRollCallData() {
            const body = document.getElementById('attendanceRollCallBody');
            const res = await fetch('http://127.0.0.1:8000/api/sessions/000000000000000000000000/checkin/', { headers: authHeaders });
            const data = await res.json();
            body.innerHTML = '';
            data.forEach(s => {
                body.innerHTML += `
                    <tr class="hover:bg-gray-50/50"><td class="py-3 font-medium text-gray-900">${s.name} <span class="text-[10px] font-mono text-gray-400 ml-2">${s.current_belt}</span></td>
                    <td class="py-3 text-right">
                        <select onchange="updateAttendanceStatus('${s.student_id}', this.value)" class="bg-gray-50 border px-2 py-1 rounded text-xs">
                            <option value="NOT_MARKED" ${s.status==='NOT_MARKED'?'selected':''}>Not Marked</option>
                            <option value="PRESENT" ${s.status==='PRESENT'?'selected':''}>Present</option>
                            <option value="ABSENT" ${s.status==='ABSENT'?'selected':''}>Absent</option>
                        </select>
                    </td></tr>`;
            });
        }

        async function updateAttendanceStatus(studentId, statusValue) {
            if(statusValue === 'NOT_MARKED') return;
            await fetch(`http://127.0.0.1:8000/api/sessions/000000000000000000000000/checkin/`, {
                method: 'POST', headers: authHeaders, body: JSON.stringify({ student_id: studentId, status: statusValue })
            });
        }
        loadRollCallData();
    </script>
</body>
</html>
