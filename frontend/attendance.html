<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Academy | Class Attendance</title>
    <style>
        html, body { background-color: #FAFAFA !important; margin: 0; padding: 0; }
        @media (min-width: 768px) { #global-sidebar-container { background-color: #0A0A0A !important; min-width: 15rem; } }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="./static/css/global.css">
    <script src="./static/js/app.js"></script>
</head>
<body class="flex h-screen overflow-hidden text-[13px] antialiased">
    <div id="global-sidebar-container" class="flex flex-col h-full shrink-0"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full bg-[#FAFAFA] relative">
        <header class="h-14 border-b border-gray-200 flex items-center justify-between px-4 md:px-8 bg-white shrink-0 gap-4">
            <div class="relative w-full max-w-xs">
                <i class="ph ph-magnifying-glass absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                <input type="text" id="attSearch" onkeyup="searchAttendance()" placeholder="Search history..." class="w-full pl-8 pr-3 py-1.5 bg-gray-50 border border-gray-200 rounded-md text-xs">
            </div>
            <div class="flex items-center gap-2">
                <button onclick="exportAttendanceExcel()" class="border border-gray-200 text-gray-700 px-3 py-1.5 rounded-md text-xs font-medium flex items-center gap-1.5 hover:bg-gray-50 transition-colors"><i class="ph ph-download"></i> Export <span id="exportMonthName" class="font-bold hidden md:inline">Month</span></button>
                <button id="addClassBtn" onclick="openSetupModal()" class="bg-black hover:bg-gray-800 text-white px-3 py-1.5 rounded-md text-xs font-medium flex items-center gap-1.5 transition-colors"><i class="ph ph-plus font-bold"></i> Add Class</button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[700px]">
                    <thead>
                        <tr class="bg-gray-50/50 text-[11px] font-medium text-gray-500 uppercase tracking-wider border-b border-gray-200">
                            <th class="px-5 py-3">Date & Time</th>
                            <th class="px-5 py-3">Class Type</th>
                            <th class="px-5 py-3">Branch & Instructor</th>
                            <th class="px-5 py-3">Stats</th>
                            <th class="px-5 py-3 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="sessionHistoryBody" class="divide-y divide-gray-100 text-xs"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal 1: Setup Class -->
    <div id="setupModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm border border-gray-200 overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-white">
                <h3 class="text-xs font-semibold text-gray-900 uppercase tracking-wider">Configure Class Session</h3>
                <button onclick="closeModals()" class="text-gray-400 hover:text-black"><i class="ph ph-x text-base"></i></button>
            </div>
            <form id="setupForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-[10px] font-semibold text-gray-500 mb-1">Class Type (Sport) *</label>
                    <select id="c_sport" required class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs font-medium"></select>
                </div>
                <div><label class="block text-[10px] font-semibold text-gray-500 mb-1">Date *</label><input type="date" id="c_date" required class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs"></div>
                
                <!-- START AND END TIME GRID -->
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-[10px] font-semibold text-gray-500 mb-1">Start Time *</label><input type="time" id="c_start_time" required class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs"></div>
                    <div><label class="block text-[10px] font-semibold text-gray-500 mb-1">End Time *</label><input type="time" id="c_end_time" required class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs"></div>
                </div>

                <button type="submit" class="w-full bg-black text-white font-medium py-2 rounded-md text-xs hover:bg-gray-800 mt-2">Fetch Roster</button>
            </form>
        </div>
    </div>

    <!-- Modal 2: Mark Roll Call -->
    <div id="rollCallModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg border border-gray-200 overflow-hidden flex flex-col max-h-[85vh]">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-white shrink-0 gap-2">
                <div><h3 class="text-xs font-semibold text-gray-900 uppercase tracking-wider">Mark Roll Call</h3><p id="rc_subtitle" class="text-[10px] font-mono text-gray-500 mt-0.5">Sport • Date Time</p></div>
                <div class="flex items-center gap-2">
                    <select id="rc_sort" onchange="renderRollCall()" class="bg-gray-50 border border-gray-200 text-gray-700 px-2 py-1.5 rounded-md text-[10px] font-medium outline-none cursor-pointer"><option value="alphabet">A-Z</option><option value="age">Age</option><option value="gender">Gender</option></select>
                    <button onclick="closeModals()" class="text-gray-400 hover:text-black ml-1"><i class="ph ph-x text-base"></i></button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-2">
                <table class="w-full text-left">
                    <tbody id="rosterBody" class="divide-y divide-gray-100 text-xs"></tbody>
                </table>
            </div>
            <div class="p-4 border-t border-gray-100 bg-gray-50 shrink-0">
                <button onclick="submitRollCall()" class="w-full bg-black text-white font-medium py-2.5 rounded-md text-xs hover:bg-gray-800">Submit Final Attendance</button>
            </div>
        </div>
    </div>

    <!-- Modal 3: View Details -->
    <div id="detailsModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm border border-gray-200 overflow-hidden flex flex-col max-h-[85vh]">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-white shrink-0">
                <h3 class="text-xs font-semibold text-gray-900 uppercase tracking-wider">Session Details</h3>
                <button onclick="closeModals()" class="text-gray-400 hover:text-black"><i class="ph ph-x text-base"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-1.5" id="detailsBody"></div>
        </div>
    </div>

    <script>
        const authHeaders = { 'Authorization': `Bearer ${localStorage.getItem('scorp_token')}`, 'Content-Type': 'application/json' };
        
        // Hide "Add Class" from Admins
        if (localStorage.getItem('scorp_role') === 'SUPER_ADMIN') {
            document.getElementById('addClassBtn').style.display = 'none';
        }

        const currentMonthName = new Date().toLocaleString('default', { month: 'long' });
        document.getElementById('exportMonthName').innerText = currentMonthName;

        let sessionState = { sport: '', date: '', time: '', roster: [] };
        let historyCache = [];

        // Global Sort Engine
        function globalSort(arr, type) {
            if(type === 'alphabet') return arr.sort((a,b) => (a.student_name||a.name||'').localeCompare(b.student_name||b.name||''));
            if(type === 'age') return arr.sort((a,b) => (a.age||0) - (b.age||0));
            if(type === 'gender') return arr.sort((a,b) => (a.gender||'').localeCompare(b.gender||''));
            return arr;
        }

        // Fetch Dynamic Sports List
        async function fetchSportsForSelect() {
            try {
                const res = await fetch('http://127.0.0.1:8000/api/sports/', { headers: authHeaders });
                const sports = await res.json();
                document.getElementById('c_sport').innerHTML = sports.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
            } catch(e) { console.error("Sports fetch failed."); }
        }

        // Time Converter (24h -> 12h AM/PM)
        function formatAMPM(time24) {
            if (!time24) return '';
            let [hours, minutes] = time24.split(':');
            hours = parseInt(hours, 10);
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12; 
            return `${hours.toString().padStart(2, '0')}:${minutes} ${ampm}`;
        }

        function openSetupModal() { document.getElementById('c_date').valueAsDate = new Date(); document.getElementById('setupModal').classList.remove('hidden'); }
        function closeModals() { document.getElementById('setupModal').classList.add('hidden'); document.getElementById('rollCallModal').classList.add('hidden'); document.getElementById('detailsModal').classList.add('hidden'); }

        // Fetch Class History
        async function loadHistory() {
            const body = document.getElementById('sessionHistoryBody');
            body.innerHTML = `<tr><td colspan="5" class="p-5 text-gray-400 text-center animate-pulse">Syncing...</td></tr>`;
            try {
                const res = await fetch('http://127.0.0.1:8000/api/attendance/sessions/', { headers: authHeaders });
                historyCache = await res.json();
                body.innerHTML = '';
                if(historyCache.length === 0) { body.innerHTML = `<tr><td colspan="5" class="p-5 text-center text-gray-400">No class sessions recorded yet.</td></tr>`; return; }
                
                historyCache.forEach(s => {
                    let displayInstructor = s.instructor_name;
                    if (!displayInstructor || displayInstructor === 'Instructor') {
                        displayInstructor = localStorage.getItem('scorp_name') || 'Instructor';
                    }

                    body.innerHTML += `
                        <tr class="hover:bg-gray-50/50 transition-colors">
                            <td class="px-5 py-3"><div class="font-medium text-gray-900">${s.date}</div><div class="text-[10px] text-gray-500 font-mono mt-0.5">${s.time}</div></td>
                            <td class="px-5 py-3"><span class="px-2 py-0.5 bg-black text-white rounded text-[10px] font-bold uppercase tracking-wider">${s.sport}</span></td>
                            <td class="px-5 py-3"><div class="font-medium text-gray-900">${s.branch_name}</div><div class="text-[10px] text-gray-500 mt-0.5">${displayInstructor}</div></td>
                            <td class="px-5 py-3"><span class="text-green-600 font-bold">${s.present_count} P</span> <span class="text-gray-300 mx-1">|</span> <span class="text-red-500 font-bold">${s.absent_count} A</span></td>
                            <td class="px-5 py-3 text-right space-x-1">
                                <button onclick="viewSessionDetails('${s.id}')" class="text-[10px] font-bold uppercase tracking-wider border px-3 py-1.5 rounded hover:bg-gray-50">View</button>
                                <button onclick="exportSingleClass('${s.id}')" title="Export this class" class="text-[10px] font-bold border border-gray-200 text-gray-600 px-2 py-1.5 rounded hover:bg-gray-50"><i class="ph ph-download text-sm"></i></button>
                            </td>
                        </tr>`;
                });
            } catch(e) { body.innerHTML = `<tr><td colspan="5" class="p-5 text-red-500 text-center">Connection failure.</td></tr>`; }
        }

        // Setup Class & Fetch Eligible Students
        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            sessionState.sport = document.getElementById('c_sport').value;
            sessionState.date = document.getElementById('c_date').value;
            const tStart = document.getElementById('c_start_time').value;
            const tEnd = document.getElementById('c_end_time').value;
            sessionState.time = `${formatAMPM(tStart)} - ${formatAMPM(tEnd)}`;

            const btn = e.target.querySelector('button'); btn.innerText = "Loading Roster...";
            try {
                const res = await fetch(`http://127.0.0.1:8000/api/attendance/eligible/?sport=${sessionState.sport}`, { headers: authHeaders });
                const roster = await res.json();
                if(roster.length === 0) { alert(`No active students found for this program.`); btn.innerText = "Fetch Roster"; return; }

                sessionState.roster = roster.map(r => ({ student_id: r.id, student_name: r.name, belt: r.belt, status: 'PRESENT', age: r.age, gender: r.gender }));
                document.getElementById('rc_subtitle').innerText = `${sessionState.sport} • ${sessionState.date} @ ${sessionState.time}`;
                document.getElementById('rc_sort').value = 'alphabet';
                renderRollCall();
                document.getElementById('setupModal').classList.add('hidden');
                document.getElementById('rollCallModal').classList.remove('hidden');
                btn.innerText = "Fetch Roster";
            } catch(err) { alert("Failed to fetch students."); btn.innerText = "Fetch Roster"; }
        });

        // Render Roll Call List
        function renderRollCall() {
            const sortType = document.getElementById('rc_sort').value;
            sessionState.roster = globalSort(sessionState.roster, sortType);
            const tbody = document.getElementById('rosterBody'); tbody.innerHTML = '';
            
            sessionState.roster.forEach((r, idx) => {
                const displayName = r.student_name || 'Unknown Student';
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-3 font-medium text-gray-900">${displayName} <span class="text-[10px] font-mono text-gray-400 ml-1 uppercase">${r.belt || 'WHITE'}</span></td>
                        <td class="px-4 py-3 text-right">
                            <select onchange="sessionState.roster[${idx}].status = this.value" class="bg-white border border-gray-200 px-2 py-1 rounded text-xs font-bold cursor-pointer outline-none ${r.status==='PRESENT'?'text-green-600':'text-red-600'}">
                                <option value="PRESENT" class="text-green-600" ${r.status==='PRESENT'?'selected':''}>Present</option>
                                <option value="ABSENT" class="text-red-600" ${r.status==='ABSENT'?'selected':''}>Absent</option>
                            </select>
                        </td>
                    </tr>`;
            });
        }

        // Submit Attendance to Backend
        async function submitRollCall() {
            try {
                // FIX: Package the data to exactly match what the Python backend expects
                const payload = {
                    sport: sessionState.sport,
                    date: sessionState.date,
                    time: sessionState.time,
                    records: sessionState.roster // Maps the frontend "roster" into the "records" array!
                };

                await fetch('http://127.0.0.1:8000/api/attendance/sessions/', { 
                    method: 'POST', 
                    headers: authHeaders, 
                    body: JSON.stringify(payload) 
                });
                closeModals(); 
                loadHistory();
            } catch(e) { alert("Failed to submit."); }
        }

        // View Specific Session Detail
        async function viewSessionDetails(sessionId) {
            document.getElementById('detailsModal').classList.remove('hidden');
            const box = document.getElementById('detailsBody'); box.innerHTML = '<div class="text-center text-gray-400 text-xs py-4 animate-pulse">Loading list...</div>';
            try {
                const res = await fetch(`http://127.0.0.1:8000/api/attendance/sessions/${sessionId}/`, { headers: authHeaders });
                const records = await res.json();
                box.innerHTML = records.map(r => `<div class="flex justify-between items-center bg-gray-50 px-3 py-2 rounded border border-gray-100"><span class="font-medium text-gray-800 text-xs">${r.student_name || 'Unknown'}</span><span class="font-bold text-[10px] tracking-wider uppercase ${r.status==='PRESENT'?'text-green-600':'text-red-500'}">${r.status}</span></div>`).join('');
            } catch(e) { box.innerHTML = '<div class="text-red-500 text-xs">Failed to load.</div>'; }
        }

        // Local Search Filter
        function searchAttendance() { const input = document.getElementById('attSearch').value.toLowerCase(); document.querySelectorAll('#sessionHistoryBody tr').forEach(row => row.style.display = row.textContent.toLowerCase().includes(input) ? '' : 'none'); }

        // Export Entire Month to Excel
        function exportAttendanceExcel() {
            if(historyCache.length === 0) return alert("No data.");
            const currentMonthStr = new Date().toISOString().slice(0, 7); 
            const monthData = historyCache.filter(s => s.date.startsWith(currentMonthStr));
            if(monthData.length === 0) return alert("No classes recorded for this month yet.");

            const exportData = monthData.map(s => {
                // Split the single time string into Start and End columns
                let start = s.time, end = '';
                if (s.time && s.time.includes(' - ')) {
                    [start, end] = s.time.split(' - ');
                }

                // Explicitly use the exact database string returned by the true_name backend engine
                let instructor = s.instructor_name || 'Instructor';

                return { 
                    "Date": s.date, 
                    "Start Time": start.trim(), 
                    "End Time": end.trim(), 
                    "Class Type": s.sport, 
                    "Branch": s.branch_name, 
                    "Instructor": instructor, 
                    "Present Count": s.present_count, 
                    "Absent Count": s.absent_count 
                };
            });

            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Attendance");
            XLSX.writeFile(wb, `Monthly_Attendance_${currentMonthName}.xlsx`);
        }

        // Export Single Class Roll Call to Excel
        async function exportSingleClass(sessionId) {
            const sessionInfo = historyCache.find(s => s.id === sessionId);
            if(!sessionInfo) return alert("Session not found.");

            try {
                const res = await fetch(`http://127.0.0.1:8000/api/attendance/sessions/${sessionId}/`, { headers: authHeaders });
                const records = await res.json();

                // Split time strings perfectly
                let start = sessionInfo.time, end = '';
                if (sessionInfo.time && sessionInfo.time.includes(' - ')) {
                    [start, end] = sessionInfo.time.split(' - ');
                }
                
                let instructor = sessionInfo.instructor_name || 'Instructor';

                const exportData = records.map(r => ({
                    "Student Name": r.student_name || 'Unknown',
                    "Status": r.status,
                    "Class Type": sessionInfo.sport,
                    "Date": sessionInfo.date,
                    "Start Time": start.trim(),
                    "End Time": end.trim(),
                    "Instructor": instructor,
                    "Branch": sessionInfo.branch_name
                }));

                const ws = XLSX.utils.json_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Class Roster");
                XLSX.writeFile(wb, `${sessionInfo.sport}_Class_${sessionInfo.date}.xlsx`);
            } catch(e) { alert("Failed to export the class."); }
        }

        // Initialize Data
        fetchSportsForSelect().then(loadHistory);
    </script>
</body>
</html>
