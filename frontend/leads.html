<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Academy | Lead Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./static/css/global.css">
    <script src="./static/js/app.js"></script>
</head>
<body class="flex h-screen overflow-hidden text-[13px] antialiased relative">
    <div id="global-sidebar-container" class="h-full shrink-0"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full bg-[#FAFAFA]">
        <header class="h-14 border-b border-gray-200 flex items-center justify-between px-8 bg-white shrink-0 gap-4">
            <div class="relative w-full max-w-md">
                <i class="ph ph-magnifying-glass absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                <input type="text" id="leadSearch" onkeyup="searchLeads()" placeholder="Search active leads..." class="w-full pl-8 pr-3 py-1.5 bg-gray-50 border border-gray-200 rounded-md text-xs transition-colors focus:bg-white">
            </div>
            <div class="flex items-center gap-2">
                <button onclick="exportLeads()" class="border border-gray-200 text-gray-700 px-3 py-1.5 rounded-md text-xs font-medium flex items-center gap-1.5 transition-colors hover:bg-gray-50"><i class="ph ph-download"></i> Export CSV</button>
                <button onclick="openLeadModal()" class="bg-black hover:bg-gray-800 text-white px-3 py-1.5 rounded-md text-xs font-medium flex items-center gap-1.5 transition-colors"><i class="ph ph-plus font-bold"></i> Add Lead</button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[700px]">
                    <thead>
                        <tr class="bg-gray-50/50 text-[11px] font-medium text-gray-500 uppercase tracking-wider border-b border-gray-200">
                            <th class="px-5 py-3">Lead Identifier</th>
                            <th class="px-5 py-3">Contact</th>
                            <th class="px-5 py-3">Program / Source</th>
                            <th class="px-5 py-3 text-right">Lead Status</th>
                        </tr>
                    </thead>
                    <tbody id="leadsTableBody" class="divide-y divide-gray-100 text-xs"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalBackdrop" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-40" onclick="closeLeadModal()"></div>
    <div id="leadModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm border border-gray-200 flex flex-col overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-white shrink-0">
                <h3 class="text-xs font-semibold text-gray-900 uppercase tracking-wider">Create New Lead</h3>
                <button onclick="closeLeadModal()" class="text-gray-400 hover:text-black"><i class="ph ph-x text-base"></i></button>
            </div>
            <form id="leadForm" class="p-6 space-y-4">
                <div><label class="block text-[10px] font-semibold text-gray-500 mb-1">Lead Name *</label><input type="text" id="l_name" required class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs"></div>
                <div><label class="block text-[10px] font-semibold text-gray-500 mb-1">Phone Number *</label><input type="text" id="l_phone" required class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs"></div>
                <div><label class="block text-[10px] font-semibold text-gray-500 mb-1">Target Program (e.g. Karate)</label><input type="text" id="l_program" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs"></div>
                <div>
                    <label class="block text-[10px] font-semibold text-gray-500 mb-1">Acquisition Source</label>
                    <select id="l_source" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs">
                        <option value="Walk-in">Walk-in</option>
                        <option value="Instagram">Instagram/Social Media</option>
                        <option value="Referral">Referral</option>
                        <option value="Website">Website Form</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-black hover:bg-gray-800 text-white font-medium py-2 rounded-md text-xs transition-colors mt-2">Save Lead</button>
            </form>
        </div>
    </div>

    <div id="drawerBackdrop" class="fixed inset-0 bg-gray-900/20 backdrop-blur-[1px] hidden z-40" onclick="closeDrawer()"></div>
    <div id="leadDrawer" class="fixed inset-y-0 right-0 w-full max-w-[420px] bg-white border-l border-gray-200 shadow-2xl z-50 translate-x-full transition-transform duration-200 ease-in-out flex flex-col">
        <div class="h-14 px-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50 shrink-0">
            <h3 class="text-xs font-semibold text-gray-900 uppercase tracking-wider">Lead Profile Manager</h3>
            <button onclick="closeDrawer()" class="text-gray-400 hover:text-black p-1"><i class="ph ph-x text-base"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-6 space-y-6">
            <div>
                <h2 id="dName" class="text-xl font-bold text-gray-900 tracking-tight">—</h2>
                <div class="flex items-center gap-3 mt-1.5">
                    <span id="dPhone" class="text-xs font-mono text-gray-500 flex items-center gap-1"><i class="ph ph-phone"></i> —</span>
                    <span id="dProgram" class="text-[10px] font-bold text-gray-400 uppercase bg-gray-100 px-2 py-0.5 rounded"></span>
                </div>
            </div>
            
            <input type="hidden" id="dId">

            <div class="space-y-2">
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider">Current Lead Status</label>
                <select id="dStatus" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-md text-xs font-medium">
                    <option value="NEW">New Lead</option>
                    <option value="CONTACTED">Contacted / Follow-up</option>
                    <option value="TRIAL_SCHEDULED">Trial Session Scheduled</option>
                    <option value="ENROLLED">Enrolled (Won)</option>
                    <option value="LOST">Lost / Not Interested</option>
                </select>
            </div>

            <div class="space-y-2">
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider">Sales Notes</label>
                <textarea id="dNotes" rows="4" placeholder="Enter follow-up details..." class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs"></textarea>
            </div>

            <div class="pt-4 border-t border-gray-100">
                <button onclick="updateLeadData()" class="w-full bg-black hover:bg-gray-800 text-white font-medium py-2.5 rounded-md text-xs transition-colors flex justify-center items-center gap-2">
                    <i class="ph ph-floppy-disk text-sm"></i> Save Updates
                </button>
            </div>
        </div>
    </div>

    <script>
        const authHeaders = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };

        let activeLeads = []; // Cache to prevent over-fetching when opening drawer

        // Render Badge Color based on status
        function getBadgeStyle(status) {
            switch(status) {
                case 'NEW': return 'bg-blue-50 text-blue-600 border-blue-200';
                case 'CONTACTED': return 'bg-yellow-50 text-yellow-600 border-yellow-200';
                case 'TRIAL_SCHEDULED': return 'bg-purple-50 text-purple-600 border-purple-200';
                case 'ENROLLED': return 'bg-green-50 text-green-600 border-green-200';
                case 'LOST': return 'bg-gray-100 text-gray-500 border-gray-200';
                default: return 'bg-gray-100 text-gray-500 border-gray-200';
            }
        }

        async function fetchLeads() {
            const body = document.getElementById('leadsTableBody');
            body.innerHTML = `<tr><td colspan="4" class="p-5 text-gray-400 text-center animate-pulse font-medium">Syncing sales records...</td></tr>`;
            try {
                const res = await fetch('http://127.0.0.1:8000/api/leads/', { headers: authHeaders });
                if(res.ok) {
                    activeLeads = await res.json();
                    body.innerHTML = '';
                    if(activeLeads.length === 0) { body.innerHTML = `<tr><td colspan="4" class="p-5 text-center text-gray-400">No leads found in system.</td></tr>`; return; }
                    
                    activeLeads.reverse().forEach(lead => {
                        const statusBadge = `<span class="px-2 py-0.5 border rounded text-[10px] font-bold uppercase tracking-wider ${getBadgeStyle(lead.status)}">${lead.status.replace('_', ' ')}</span>`;
                        body.innerHTML += `
                            <tr class="hover:bg-gray-50/50 transition-colors cursor-pointer group" onclick="openDrawer('${lead.id}')">
                                <td class="px-5 py-3 font-medium text-gray-900 group-hover:text-black">${lead.name}</td>
                                <td class="px-5 py-3 text-gray-500 font-mono">${lead.phone}</td>
                                <td class="px-5 py-3 text-gray-600">${lead.program} <span class="text-gray-400 text-[10px] ml-1 uppercase">(${lead.source})</span></td>
                                <td class="px-5 py-3 text-right">${statusBadge}</td>
                            </tr>`;
                    });
                }
            } catch(e) { body.innerHTML = `<tr><td colspan="4" class="p-5 text-red-500 text-center">Failed to load lead connections.</td></tr>`; }
        }

        // Drawer Controls
        function openDrawer(leadId) {
            const lead = activeLeads.find(l => l.id === leadId);
            if(!lead) return;

            document.getElementById('dId').value = lead.id;
            document.getElementById('dName').textContent = lead.name;
            document.getElementById('dPhone').innerHTML = `<i class="ph ph-phone"></i> ${lead.phone}`;
            document.getElementById('dProgram').textContent = lead.program || 'GENERAL INQUIRY';
            document.getElementById('dStatus').value = lead.status || 'NEW';
            document.getElementById('dNotes').value = lead.notes || '';

            document.getElementById('drawerBackdrop').classList.remove('hidden');
            document.getElementById('profileDrawer').classList.remove('translate-x-full');
        }

        function closeDrawer() { 
            document.getElementById('drawerBackdrop').classList.add('hidden'); 
            document.getElementById('profileDrawer').classList.add('translate-x-full'); 
        }

        // Modal Controls
        function openLeadModal() { document.getElementById('leadModal').classList.remove('hidden'); document.getElementById('modalBackdrop').classList.remove('hidden'); }
        function closeLeadModal() { document.getElementById('leadModal').classList.add('hidden'); document.getElementById('modalBackdrop').classList.add('hidden'); document.getElementById('leadForm').reset(); }

        // Form Submit
        document.getElementById('leadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const payload = {
                name: document.getElementById('l_name').value,
                phone: document.getElementById('l_phone').value,
                program: document.getElementById('l_program').value,
                source: document.getElementById('l_source').value,
                status: 'NEW'
            };
            await fetch('http://127.0.0.1:8000/api/leads/', { method: 'POST', headers: authHeaders, body: JSON.stringify(payload) });
            closeLeadModal(); fetchLeads();
        });

        // Update Lead Details
        async function updateLeadData() {
            const leadId = document.getElementById('dId').value;
            const payload = {
                lead_id: leadId,
                status: document.getElementById('dStatus').value,
                notes: document.getElementById('dNotes').value
            };

            const btn = event.currentTarget;
            btn.innerHTML = `<i class="ph ph-spinner animate-spin text-sm"></i> Saving...`;

            try {
                // Ensure your Django view handles PUT requests for this endpoint
                await fetch('http://127.0.0.1:8000/api/leads/', { 
                    method: 'PUT', 
                    headers: authHeaders, 
                    body: JSON.stringify(payload) 
                });
                closeDrawer(); 
                fetchLeads(); // Refresh table to show new status badges
            } catch (err) {
                alert("Failed to update lead.");
            } finally {
                btn.innerHTML = `<i class="ph ph-floppy-disk text-sm"></i> Save Updates`;
            }
        }

        // Search Routine
        function searchLeads() {
            const input = document.getElementById('leadSearch').value.toLowerCase();
            document.querySelectorAll('#leadsTableBody tr').forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(input) ? '' : 'none';
            });
        }

        fetchLeads();
    </script>
</body>
</html>
