<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Academy | Master Schedule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FAFAFA; color: #111111; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #D1D5DB; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-[13px] antialiased selection:bg-gray-200 selection:text-black">

    <script>
        const token = localStorage.getItem('scorp_token');
        if (!token) window.location.href = 'login.html';
    </script>

    <!-- Dark SaaS Sidebar -->
    <aside class="w-56 bg-[#0A0A0A] border-r border-white/10 flex flex-col shrink-0 z-20">
        <div class="py-5 px-5 flex items-center gap-2">
            <div class="w-5 h-5 bg-white rounded-sm flex items-center justify-center text-black">
                <i class="ph-fill ph-rocket-launch text-[10px]"></i>
            </div>
            <div class="leading-none">
                <h1 class="font-semibold tracking-tight text-sm text-white">Scorpion Academy</h1>
                <p class="text-[10px] text-gray-400 font-medium mt-0.5">CRM Architecture</p>
            </div>
        </div>

        <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
            <a href="dashboard.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors">
                <i class="ph ph-squares-four text-base"></i> Overview
            </a>
            <a href="roster.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors">
                <i class="ph ph-users text-base"></i> Active Roster
            </a>
            <!-- Active State -->
            <a href="schedule.html" class="flex items-center gap-2.5 px-2.5 py-1.5 bg-white/10 text-white rounded-md transition-colors font-medium">
                <i class="ph-fill ph-calendar-blank text-base"></i> Class Schedule
            </a>
            <a href="ledger.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors">
                <i class="ph ph-wallet text-base"></i> Financial Ledger
            </a>
        </nav>

        <div class="p-4 flex flex-col gap-4">
            <button id="logoutBtn" class="flex items-center gap-2 w-full px-2.5 py-1.5 text-gray-400 hover:text-white hover:bg-white/5 rounded-md transition-colors text-left">
                <i class="ph ph-sign-out text-base"></i> Sign out
            </button>
            <div class="pt-3 border-t border-white/10 px-2">
                <p class="text-[10px] text-gray-500">
                    Developed by <br>
                    <a href="https://dexys.in" target="_blank" class="font-medium text-gray-400 hover:text-white transition-colors">Dexys IT Solutions</a>
                </p>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen relative z-10">
        <header class="h-14 border-b border-gray-200 flex items-center justify-between px-8 bg-white/80 backdrop-blur-md shrink-0">
            <h2 class="font-medium text-sm text-gray-800">Today's Sessions</h2>
            <div class="text-xs font-medium bg-[#0A0A0A] text-white px-3 py-1.5 rounded-md shadow-sm" id="currentDate"></div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 max-w-6xl w-full mx-auto">
            <div id="scheduleGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="col-span-full py-10 text-gray-500 flex items-center gap-2 text-xs">
                    <i class="ph ph-spinner animate-spin text-base"></i> Fetching live schedule...
                </div>
            </div>
        </div>
    </main>

    <!-- Check-In Modal Overlay -->
    <div id="checkInModal" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/20 backdrop-blur-sm hidden">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm border border-gray-200 overflow-hidden" id="modalPanel">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-white">
                <h3 class="text-sm font-semibold text-gray-900">Manual Check-In</h3>
                <button id="closeModalBtn" class="text-gray-400 hover:text-gray-800 transition-colors"><i class="ph ph-x text-base"></i></button>
            </div>
            <form id="checkInForm" class="p-5 space-y-4">
                <input type="hidden" id="activeSessionId">
                <div>
                    <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-1.5">Student Cloud ID</label>
                    <input type="text" id="studentId" required placeholder="e.g. 6a229369..." class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs transition-colors font-mono">
                </div>
                <div id="modalError" class="hidden text-red-500 text-[11px] font-medium text-center bg-red-50 py-2 rounded-md border border-red-100"></div>
                <div class="pt-2">
                    <button type="submit" id="saveBtn" class="w-full bg-[#0A0A0A] text-white font-medium py-2 rounded-md text-xs transition-colors">Log Attendance</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        const authHeaders = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };

        // Fetch Live Batches
        async function fetchSchedule() {
            const grid = document.getElementById('scheduleGrid');
            try {
                // Assuming your backend URL from Phase 13
                const response = await fetch('http://127.0.0.1:8000/api/sports/scheduling/batches/', { headers: authHeaders });
                
                if (response.ok) {
                    const batches = await response.json();
                    grid.innerHTML = '';
                    
                    if (batches.length === 0) {
                        grid.innerHTML = `<p class="text-gray-500 text-xs">No active sessions scheduled for today.</p>`;
                        return;
                    }

                    batches.forEach(batch => {
                        const card = `
                            <div class="p-5 bg-white border border-gray-200 rounded-xl hover:border-black transition-colors group shadow-sm flex flex-col justify-between min-h-[140px]">
                                <div>
                                    <div class="flex justify-between items-start mb-2">
                                        <span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-[10px] font-semibold uppercase tracking-wider">${batch.sport_name || 'Sport'}</span>
                                        <span class="text-xs font-semibold text-gray-900">${batch.start_time} - ${batch.end_time}</span>
                                    </div>
                                    <h3 class="text-sm font-semibold text-gray-900">${batch.name}</h3>
                                    <p class="text-[11px] text-gray-500 mt-1">Instructor ID: ${batch.instructor_id ? batch.instructor_id.slice(-6) : 'Unassigned'}</p>
                                </div>
                                <div class="pt-4 border-t border-gray-100 flex justify-between items-center mt-4">
                                    <span class="text-[11px] font-medium text-gray-500 font-mono">ID: ${batch._id.slice(-6)}</span>
                                    <button onclick="openCheckIn('${batch._id}')" class="text-[10px] font-medium bg-[#0A0A0A] text-white px-2.5 py-1 rounded hover:bg-gray-800 transition-colors">Check-In</button>
                                </div>
                            </div>
                        `;
                        grid.innerHTML += card;
                    });
                }
            } catch (err) {
                grid.innerHTML = `<p class="text-red-500 text-xs bg-red-50 px-3 py-2 rounded-md border border-red-100 inline-block">API Connection Refused</p>`;
            }
        }

        // Modal Logic
        const modal = document.getElementById('checkInModal');
        function openCheckIn(sessionId) {
            document.getElementById('activeSessionId').value = sessionId;
            modal.classList.remove('hidden');
        }
        
        document.getElementById('closeModalBtn').addEventListener('click', () => {
            modal.classList.add('hidden');
            document.getElementById('checkInForm').reset();
            document.getElementById('modalError').classList.add('hidden');
        });

        // Submit Attendance
        document.getElementById('checkInForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const errorBox = document.getElementById('modalError');
            btn.textContent = 'Processing...';
            errorBox.classList.add('hidden');

            const payload = {
                student_id: document.getElementById('studentId').value.trim(),
                session_id: document.getElementById('activeSessionId').value
            };

            try {
                // Post to your attendance endpoint
                const response = await fetch('http://127.0.0.1:8000/api/students/attendance/', {
                    method: 'POST',
                    headers: authHeaders,
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    document.getElementById('closeModalBtn').click();
                    alert("Attendance successfully logged.");
                } else {
                    const data = await response.json();
                    errorBox.textContent = data.error || 'Check-in failed.';
                    errorBox.classList.remove('hidden');
                }
            } catch (err) {
                errorBox.textContent = 'API Connection Failed.';
                errorBox.classList.remove('hidden');
            } finally {
                btn.textContent = 'Log Attendance';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.href = 'login.html'; });
        fetchSchedule();
    </script>
</body>
</html>
