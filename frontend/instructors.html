<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Academy | Staff Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="static/css/global.css">
    <script src="static/js/app.js"></script>
</head>
<body class="flex h-screen overflow-hidden text-[13px] antialiased selection:bg-gray-200 selection:text-black">


    <aside id="mainSidebar" class="fixed inset-y-0 left-0 w-60 bg-[#0A0A0A] border-r border-white/10 flex flex-col shrink-0 z-40 md:relative">
        <div class="py-5 px-5 flex items-center justify-between border-b border-white/5"><div class="flex items-center gap-2"><div class="w-5 h-5 bg-white rounded-sm flex items-center justify-center text-black"><i class="ph-fill ph-shield-check text-[11px]"></i></div><h1 class="font-semibold tracking-tight text-sm text-white">Scorpion Academy</h1></div></div>
        <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
            <a href="dashboard.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-squares-four text-base"></i> Dashboard</a>
            <a href="leads.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-funnel text-base"></i> Lead Management</a>
            <a href="students.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-student text-base"></i> Students</a>
            <a href="attendance.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-notebook text-base"></i> Attendance Log</a>
            <a href="fees.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-wallet text-base"></i> Fee Accounting</a>
            <a href="exams.html" class="flex items-center gap-2.5 px-2.5 py-1.5 text-gray-400 hover:bg-white/5 hover:text-white rounded-md transition-colors font-medium"><i class="ph ph-certificate text-base"></i> Belt Examinations</a>
            <a href="instructors.html" class="flex items-center gap-2.5 px-2.5 py-1.5 bg-white/10 text-white rounded-md font-medium"><i class="ph-fill ph-chalkboard-teacher text-base"></i> Staff Management</a>
        </nav>
        <div class="p-4 border-t border-white/5 space-y-3">
            <div class="px-2.5 py-2 bg-white/5 rounded-lg border border-white/5">
                <div id="userProfileEmail" class="text-white font-medium text-xs truncate">—</div>
                <div id="userProfileRole" class="text-gray-400 font-mono text-[9px] uppercase tracking-wider mt-0.5">—</div>
            </div>
            <button id="logoutBtn" class="flex items-center gap-2 w-full px-2.5 py-1.5 text-gray-400 hover:text-white text-left transition-colors"><i class="ph ph-sign-out text-base"></i> Log Out</button>
            <div class="text-center pt-1 border-t border-white/5">
                <a href="https://dexys.in" target="_blank" class="text-[10px] text-gray-600 hover:text-gray-400 transition-colors tracking-wide font-medium">Developed by Dexys IT Solutions</a>
            </div>
        </div>
    </aside>


    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full">
        <header class="h-14 border-b border-gray-200 flex items-center justify-between px-8 bg-white shrink-0">
            <h2 class="font-semibold text-xs uppercase tracking-widest text-gray-400">Instructor Roster (Super Admin Only)</h2>
            <button onclick="openModal()" class="bg-black hover:bg-gray-800 text-white px-3 py-1.5 rounded-md text-xs font-medium flex items-center gap-1.5"><i class="ph ph-plus font-bold"></i> Deploy Instructor</button>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[700px]">
                    <thead>
                        <tr class="bg-gray-50/50 text-[11px] font-medium text-gray-500 uppercase tracking-wider border-b border-gray-200">
                            <th class="px-5 py-3">Instructor Profile</th>
                            <th class="px-5 py-3">Branch Allocation</th>
                            <th class="px-5 py-3">System Email</th>
                            <th class="px-5 py-3 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="instructorTableBody" class="divide-y divide-gray-100 text-xs"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="instructorModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden bg-black/40 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm border border-gray-200 flex flex-col overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-white">
                <h3 id="modalTitle" class="text-xs font-semibold text-gray-900 uppercase tracking-wider">Create Instructor</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-black"><i class="ph ph-x text-base"></i></button>
            </div>
            <form id="instructorForm" class="p-6 space-y-4">
                <input type="hidden" id="i_id">
                <div><label class="block text-[10px] font-semibold text-gray-500 mb-1">Full Name</label><input type="text" id="i_name" required class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs"></div>
                <div><label class="block text-[10px] font-semibold text-gray-500 mb-1">Email (Login ID)</label><input type="email" id="i_email" required class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs"></div>
                <div><label class="block text-[10px] font-semibold text-gray-500 mb-1">Branch Name / Location</label><input type="text" id="i_branch" required class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs"></div>
                <div><label class="block text-[10px] font-semibold text-gray-500 mb-1">Account Password <span id="passHint" class="text-gray-400 font-normal ml-1"></span></label><input type="password" id="i_pass" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs"></div>
                <button type="submit" class="w-full bg-black text-white font-medium py-2 rounded-md text-xs">Commit Account</button>
            </form>
        </div>
    </div>

    <script>
        const authHeaders = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };

        let instructorsCache = [];

        function openModal(instructorId = null) {
            document.getElementById('instructorForm').reset();
            document.getElementById('i_id').value = '';
            document.getElementById('passInput') && document.getElementById('passInput').removeAttribute('required');

            if (instructorId) {
                document.getElementById('modalTitle').textContent = "Modify Profile";
                document.getElementById('passHint').textContent = "(Blank to keep current)";
                const target = instructorsCache.find(i => i.id === instructorId);
                if (target) {
                    document.getElementById('i_id').value = target.id;
                    document.getElementById('i_name').value = target.name;
                    document.getElementById('i_email').value = target.email;
                    document.getElementById('i_branch').value = target.branch_name;
                }
            } else {
                document.getElementById('modalTitle').textContent = "Create Instructor";
                document.getElementById('passHint').textContent = "*";
                document.getElementById('i_pass').setAttribute('required', 'true');
            }
            document.getElementById('instructorModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('instructorModal').classList.add('hidden'); }

        async function loadInstructors() {
            const body = document.getElementById('instructorTableBody');
            try {
                const res = await fetch('http://127.0.0.1:8000/api/instructors/', { headers: authHeaders });
                instructorsCache = await res.json();
                body.innerHTML = '';
                instructorsCache.forEach(i => {
                    body.innerHTML += `
                        <tr class="hover:bg-gray-50/50">
                            <td class="px-5 py-3 font-medium text-gray-900">${i.name}</td>
                            <td class="px-5 py-3"><span class="px-2 py-0.5 bg-gray-100 border border-gray-200 rounded text-[10px] uppercase font-semibold">${i.branch_name}</span></td>
                            <td class="px-5 py-3 font-mono text-gray-500">${i.email}</td>
                            <td class="px-5 py-3 text-right"><button onclick="openModal('${i.id}')" class="text-xs font-medium border border-gray-200 px-3 py-1 rounded bg-white shadow-sm">Edit</button></td>
                        </tr>`;
                });
            } catch(e) { console.error(e); }
        }

        document.getElementById('instructorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('i_name').value,
                email: document.getElementById('i_email').value,
                branch_name: document.getElementById('i_branch').value,
                password: document.getElementById('i_pass').value
            };
            const id = document.getElementById('i_id').value;
            if (id) payload.instructor_id = id;

            await fetch('http://127.0.0.1:8000/api/instructors/', { 
                method: id ? 'PUT' : 'POST', headers: authHeaders, body: JSON.stringify(payload) 
            });
            closeModal(); loadInstructors();
        });
        loadInstructors();
    </script>
</body>
</html>
