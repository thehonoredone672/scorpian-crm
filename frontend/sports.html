<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Academy | Sports Management</title>
    <style>
        html, body { background-color: #FAFAFA !important; margin: 0; padding: 0; }
        @media (min-width: 768px) { #global-sidebar-container { background-color: #0A0A0A !important; min-width: 15rem; } }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="./static/css/global.css">
    <script src="./static/js/app.js"></script>
</head>
<body class="flex h-screen overflow-hidden text-[13px] antialiased">
    <div id="global-sidebar-container" class="flex flex-col h-full shrink-0"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full bg-[#FAFAFA] relative">
        <header class="h-14 border-b border-gray-200 flex items-center justify-between px-4 md:px-8 bg-white shrink-0">
            <h2 class="font-semibold text-xs uppercase tracking-widest text-gray-400">Sports Programs</h2>
            <button onclick="openAddModal()" class="bg-black hover:bg-gray-800 text-white px-3 py-1.5 rounded-md text-xs font-medium flex items-center gap-1.5 transition-colors admin-only"><i class="ph ph-plus font-bold"></i> Add Sport</button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[600px]">
                    <thead>
                        <tr class="bg-gray-50/50 text-[11px] font-medium text-gray-500 uppercase tracking-wider border-b border-gray-200">
                            <th class="px-5 py-3">Sport Name</th>
                            <th class="px-5 py-3">Global Active Students</th>
                            <th class="px-5 py-3 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="sportsBody" class="divide-y divide-gray-100 text-xs"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="addModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm border border-gray-200 overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center">
                <h3 class="text-xs font-semibold text-gray-900 uppercase tracking-wider">Add New Sport</h3>
                <button onclick="closeModals()" class="text-gray-400 hover:text-black"><i class="ph ph-x text-base"></i></button>
            </div>
            <form id="addSportForm" class="p-6 space-y-4">
                <div><label class="block text-[10px] font-semibold text-gray-500 mb-1">Sport Name *</label><input type="text" id="n_sport" required class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-xs placeholder-gray-400" placeholder="e.g. Boxing"></div>
                <button type="submit" class="w-full bg-black text-white font-medium py-2 rounded-md text-xs hover:bg-gray-800">Add to Academy</button>
            </form>
        </div>
    </div>

    <div id="rosterModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-3xl border border-gray-200 overflow-hidden flex flex-col max-h-[85vh]">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-white shrink-0 gap-4">
                <div><h3 class="text-xs font-semibold text-gray-900 uppercase tracking-wider">Sport List</h3><p id="r_subtitle" class="text-[10px] font-mono text-gray-500 mt-0.5">Sport Name</p></div>
                <div class="flex items-center gap-2">
                    <select id="rosterSort" onchange="renderRoster()" class="bg-gray-50 border border-gray-200 text-gray-700 px-2 py-1.5 rounded-md text-xs font-medium outline-none cursor-pointer"><option value="alphabet">Sort: A-Z</option><option value="age">Sort: Age</option><option value="gender">Sort: Gender</option></select>
                    <button onclick="exportRosterExcel()" class="border border-gray-200 text-gray-700 px-3 py-1.5 rounded-md text-xs font-medium flex items-center gap-1.5 hover:bg-gray-50 transition-colors"><i class="ph ph-download"></i> Export</button>
                    <button onclick="closeModals()" class="text-gray-400 hover:text-black ml-2"><i class="ph ph-x text-lg"></i></button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-0">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 sticky top-0"><tr class="text-[10px] font-bold text-gray-400 uppercase tracking-wider border-b border-gray-100"><th class="px-4 py-2">Student</th><th class="px-4 py-2">Details</th><th class="px-4 py-2 text-right">Branch</th></tr></thead>
                    <tbody id="rosterBody" class="divide-y divide-gray-100 text-xs"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const authHeaders = { 'Authorization': `Bearer ${localStorage.getItem('scorp_token')}`, 'Content-Type': 'application/json' };
        if (localStorage.getItem('scorp_role') !== 'SUPER_ADMIN') window.location.href = 'dashboard.html';

        let currentSport = '';
        let currentRoster = [];

        function globalSort(arr, type) {
            if(type === 'alphabet') return arr.sort((a,b) => {
                const nameA = a.name || a.first_name || '';
                const nameB = b.name || b.first_name || '';
                return nameA.localeCompare(nameB);
            });
            if(type === 'age') return arr.sort((a,b) => (a.age||0) - (b.age||0));
            if(type === 'gender') return arr.sort((a,b) => (a.gender||'').localeCompare(b.gender||''));
            return arr;
        }

        function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); }
        function closeModals() { document.getElementById('addModal').classList.add('hidden'); document.getElementById('rosterModal').classList.add('hidden'); }

        async function loadSports() {
            const body = document.getElementById('sportsBody');
            body.innerHTML = `<tr><td colspan="3" class="p-5 text-gray-400 text-center animate-pulse">Loading sports...</td></tr>`;
            try {
                const res = await fetch('http://127.0.0.1:8000/api/sports/', { headers: authHeaders });
                const sports = await res.json();
                body.innerHTML = '';
                if(sports.length === 0) { body.innerHTML = `<tr><td colspan="3" class="p-5 text-center text-gray-400">No sports added yet.</td></tr>`; return; }
                
                sports.forEach(s => {
                    body.innerHTML += `
                        <tr class="hover:bg-gray-50/50 transition-colors">
                            <td class="px-5 py-4 font-bold text-gray-900 uppercase tracking-wider text-[11px]">${s.name}</td>
                            <td class="px-5 py-4"><span class="px-2 py-0.5 bg-black text-white rounded text-[10px] font-bold">${s.student_count} Enrolled</span></td>
                            <td class="px-5 py-4 text-right space-x-2">
                                <button onclick="fetchRoster('${s.name}')" class="text-[10px] font-bold uppercase tracking-wider border px-3 py-1.5 rounded hover:bg-gray-50">List</button>
                                <button onclick="deleteSport('${s.name}')" class="text-[10px] font-bold uppercase tracking-wider text-red-600 border border-red-200 px-3 py-1.5 rounded hover:bg-red-50">Delete</button>
                            </td>
                        </tr>`;
                });
            } catch(e) { body.innerHTML = `<tr><td colspan="3" class="p-5 text-red-500 text-center">Failed to load.</td></tr>`; }
        }

        document.getElementById('addSportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('n_sport').value;
            try {
                const res = await fetch('http://127.0.0.1:8000/api/sports/', { method: 'POST', headers: authHeaders, body: JSON.stringify({ name }) });
                if(res.ok) { closeModals(); document.getElementById('addSportForm').reset(); loadSports(); }
                else alert((await res.json()).error);
            } catch(e) { alert("Failed to add sport."); }
        });

        async function deleteSport(name) {
            if(!confirm(`Delete ${name}? This will NOT delete students, but it will remove the sport from the system.`)) return;
            try {
                await fetch('http://127.0.0.1:8000/api/sports/', { method: 'DELETE', headers: authHeaders, body: JSON.stringify({ name }) });
                loadSports();
            } catch(e) { alert("Failed to delete."); }
        }

        async function fetchRoster(sportName) {
            currentSport = sportName;
            document.getElementById('r_subtitle').innerText = `Enrolled in ${sportName}`;
            document.getElementById('rosterSort').value = 'alphabet';
            document.getElementById('rosterModal').classList.remove('hidden');
            const tbody = document.getElementById('rosterBody');
            tbody.innerHTML = `<tr><td colspan="3" class="p-5 text-center text-gray-400 animate-pulse">Loading list...</td></tr>`;
            try {
                const res = await fetch(`http://127.0.0.1:8000/api/sports/${sportName}/roster/`, { headers: authHeaders });
                currentRoster = await res.json();
                renderRoster();
            } catch(e) { tbody.innerHTML = `<tr><td colspan="3" class="text-center text-red-500 p-4">Error</td></tr>`; }
        }

        function renderRoster() {
            const tbody = document.getElementById('rosterBody');
            if(currentRoster.length === 0) { tbody.innerHTML = `<tr><td colspan="3" class="p-5 text-center text-gray-400">No students enrolled.</td></tr>`; return; }
            
            const sortType = document.getElementById('rosterSort').value;
            const sorted = globalSort([...currentRoster], sortType);

            tbody.innerHTML = sorted.map(r => {
                // Bulletproof Fallbacks to eradicate "undefined"
                let studentName = r.name || r.first_name || '';
                if (r.last_name && r.last_name !== 'undefined') studentName += ' ' + r.last_name;
                if (!studentName || studentName.trim() === '') studentName = 'Unknown Student';

                const belt = r.belt || r.current_belt || 'WHITE';
                const branch = r.branch || r.branch_name || 'UNASSIGNED';
                const age = r.age && r.age !== 'undefined' ? r.age : 'N/A';
                const gender = r.gender && r.gender !== 'undefined' ? r.gender : 'N/A';

                return `
                <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3 font-medium text-gray-900">${studentName}</td>
                    <td class="px-4 py-3 text-[10px] text-gray-500 font-mono">Age: ${age} | Gen: ${gender} | Belt: <span class="font-bold text-gray-800 uppercase">${belt}</span></td>
                    <td class="px-4 py-3 text-right text-[10px] uppercase font-bold tracking-wider text-gray-400">${branch}</td>
                </tr>
                `;
            }).join('');
        }

        function exportRosterExcel() {
            if(currentRoster.length === 0) return alert("No data.");
            const sortType = document.getElementById('rosterSort').value;
            const sorted = globalSort([...currentRoster], sortType);
            
            const exportData = sorted.map(r => {
                let studentName = r.name || r.first_name || '';
                if (r.last_name && r.last_name !== 'undefined') studentName += ' ' + r.last_name;
                if (!studentName || studentName.trim() === '') studentName = 'Unknown Student';

                return { 
                    "Name": studentName, 
                    "Branch": r.branch || r.branch_name || 'UNASSIGNED', 
                    "Belt": r.belt || r.current_belt || 'WHITE', 
                    "Age": r.age && r.age !== 'undefined' ? r.age : 'N/A', 
                    "Gender": r.gender && r.gender !== 'undefined' ? r.gender : 'N/A', 
                    "Blood Type": r.blood_type || 'N/A', 
                    "Address": r.address || 'N/A', 
                    "Phone": r.phone || 'N/A'
                };
            });
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, `${currentSport} List`);
            XLSX.writeFile(wb, `${currentSport}_List.xlsx`);
        }

        loadSports();
    </script>
</body>
</html>
